        inspectionMarkerFeatures = [markerFeature];
        inspectionOrigin = approximateOrigin;
        inspectionPending = true;
        const sequence = ++inspectSequence;
        renderInspectionLoading(approximateOrigin, true);
        setLayerVisibility(
          [...destinationRecords.values()].map(record => record.destinationLayer),
          false
        );
        loadPlaceCatalog()
          .then(placeCatalog => {
            if (sequence !== inspectSequence) return;
            const canonicalMarker = catalogMarkerFeature(placeId, placeCatalog);
            const [lng, lat] = canonicalMarker.geometry.coordinates;
            inspectionMarkerFeatures = [canonicalMarker];
            inspectionOrigin = { lng, lat };
            inspectionPending = false;
            inspectLocation(inspectionOrigin);
          })
          .catch(error => {
            if (sequence === inspectSequence) rejectSharedInspection(error);
          });
      }

      function featureKey(feature) {
        return feature.properties.place_id || `${feature.properties.service}:${feature.properties.osm_type}:${feature.properties.osm_id}`;
      }

      function dedupeFeatures(features) {
        const seen = new Set();
        const result = [];
        features.forEach(feature => {
          const key = featureKey(feature);
          if (seen.has(key)) return;
          seen.add(key);
          result.push(feature);
        });
        return result;
      }

      // The place-card body lines (address, opening hours, phone), shared by
      // the "selected place" card and the per-destination expansion in the
      // inspect dialog.
      function placeDetailValues(properties) {
        const address = [
          [properties["addr:street"], properties["addr:housenumber"]].filter(Boolean).join(" "),
          properties["addr:city"],
          properties["addr:postcode"]
        ].filter(Boolean).join(", ");
        return [address, properties.opening_hours, properties.phone || properties["contact:phone"]]
          .filter(Boolean);
      }

      function renderClickedPlaces(features) {
        const root = document.getElementById("clicked-place");
        root.replaceChildren();
        if (!features.length) return;
        const card = document.createElement("section");
        card.className = "clicked-place";
        const title = document.createElement("h3");
        title.textContent = t("selectedPlaces", features.length);
        card.append(title);
        const chips = document.createElement("div");
        chips.className = "place-chips";
        for (const feature of features) {
          const properties = feature.properties;
          const chip = document.createElement("span");
          chip.className = "place-chip";
          chip.style.setProperty("--service-color", serviceStyles[properties.service]?.color || "#64748b");
          chip.textContent = `${properties.name || properties.brand || t("unnamed")} · ${kindLabel(properties.kind)}`;
          chips.append(chip);
        }
        card.append(chips);
        for (const value of placeDetailValues(features[0].properties)) {
          const paragraph = document.createElement("p");
          paragraph.textContent = value;
          card.append(paragraph);
        }
        root.append(card);
      }

      function destinationRecordsForRequirements(requirements) {
        return requirements.map(service => {
          const preset = selectedPreset(service);
          return destinationRecords.get(presetKey(service.id, preset.mode, preset.minutes));
        });
      }

      function renderLocationResults(origin, markerFeatures, destinationFeatures, placeCatalog) {
        const requirements = activeRequirements();
        const byService = new Map(requirements.map(service => [service.id, new Map()]));
        destinationFeatures.forEach(feature => {
          const properties = feature.properties;
          if (!byService.has(properties.service)) return;
          let placeIds;
          try {
            placeIds = JSON.parse(properties.lookup_ids);
          } catch (error) {
            throw new Error(`Invalid destination IDs in ${properties.service}: ${error}`);
          }
          if (!Array.isArray(placeIds)) {
            throw new Error(`Invalid destination IDs in ${properties.service}: expected an array`);
          }
          placeIds.forEach(placeId => {
            const destination = placeCatalog[placeId];
            if (!destination) {
              throw new Error(
                `Destination lookup references unknown place index ${placeId} in ${properties.service}`
              );
            }
            byService.get(properties.service).set(placeId, destination);
          });
        });
        // A #place inspection uses the primary marker's coordinates as the
        // one origin for every service. Its own service is therefore a true
        // zero-distance destination even when Valhalla snapped that POI to a
        // routing edge outside the narrow rendered hit corridor.
        const primaryMarker = markerFeatures[0];
        const primaryService = primaryMarker?.properties.service;
        if (primaryMarker && byService.has(primaryService)) {
          const placeIndex = Number(primaryMarker.properties.place_index);
          const destination = placeCatalog[placeIndex];
          if (!destination) {
            throw new Error(`Destination dot references unknown place index ${placeIndex}`);
          }
          byService.get(primaryService).set(placeIndex, destination);
        }
        document.getElementById("location-coordinates").textContent =
          t("coordsLine", `${origin.lat.toFixed(6)}, ${origin.lng.toFixed(6)}`);
        renderClickedPlaces(markerFeatures.map(feature => ({
          ...feature,
          properties: {
            ...placeCatalog[Number(feature.properties.place_index)],
            ...feature.properties
          }
        })));
        const results = document.getElementById("location-results");
        results.replaceChildren();
        let passed = 0;
        requirements.forEach(service => {
          const preset = selectedPreset(service);
          const destinations = [...byService.get(service.id).values()]
            .sort((left, right) => haversineMeters(origin, left) - haversineMeters(origin, right));
          const pass = destinations.length > 0;
          if (pass) passed += 1;

          const card = document.createElement("section");
          card.className = `result-card ${pass ? "pass" : "fail"}`;
          card.style.setProperty("--service-color", serviceStyles[service.id].color);
          const row = document.createElement("div");
          row.className = "status-row";
          const pill = document.createElement("span");
          pill.className = "status-pill";
          pill.textContent = pass ? t("pillAvailable") : t("pillNotFound");
          const heading = document.createElement("h3");
          heading.textContent = serviceLabel(service);
          row.append(pill, heading);
          const summary = document.createElement("p");
          summary.textContent = destinations.length
            ? t("resultSummary", destinations.length, presetLabel(preset))
            : t("resultNone", serviceLabel(service), presetLabel(preset));
          card.append(row, summary);
          if (destinations.length) {
            const first = destinations.slice(0, 3);
            card.append(destinationList(first, origin, preset.mode));
            if (destinations.length > first.length) {
              const details = document.createElement("details");
              details.className = "more-destinations";
              const detailsSummary = document.createElement("summary");
              detailsSummary.textContent = t("showMore", destinations.length - first.length);
              details.append(detailsSummary);
              details.addEventListener("toggle", () => {
                if (!details.open || details.dataset.loaded) return;
                details.dataset.loaded = "true";
                details.append(destinationList(destinations.slice(first.length), origin, preset.mode));
              });
              card.append(details);
            }
          }
          results.append(card);
        });

        const intersection = document.getElementById("intersection-summary");
        intersection.textContent = requirements.length
          ? passed === requirements.length
            ? t("meetsAllSelected", requirements.length)
            : t("meetsSomeSelected", passed, requirements.length)
          : t("selectToInspect");
        results.setAttribute("aria-busy", "false");
        const dialog = document.getElementById("location-dialog");
        if (!dialog.open) dialog.showModal();
      }

      function inspectLocation(lngLat, updateHash = true, sequence = ++inspectSequence) {
        inspectionOrigin = { lng: Number(lngLat.lng), lat: Number(lngLat.lat) };
        renderInspectionLoading(inspectionOrigin, updateHash);
        setLayerVisibility(
          [...destinationRecords.values()].map(record => record.destinationLayer),
          false
        );
        if (map.getZoom() < inspectZoom) {
          document.getElementById("map-status").textContent = t("zoomingIn");
          map.easeTo({
            center: lngLat,
            zoom: inspectZoom,
            offset: inspectionOffset(),
            duration: 450
          });
          map.once("idle", () => {
            if (sequence === inspectSequence) inspectLocation(lngLat, updateHash, sequence);
          });
          return;
        }
        const requiredRecords = destinationRecordsForRequirements(activeRequirements());
        const destinationLayerIds = requiredRecords.map(record => record.destinationLayer);
        const requiredDestinationSources = new Set(
          requiredRecords.map(record => record.destinationSource)
        );
        if (!destinationLayerIds.length) {
          inspectVisibleLocation(lngLat, updateHash, destinationLayerIds, sequence);
          return;
        }
        // A transient tile error must not poison every later inspection of
        // this service: clear the failure mark and force a refetch via
        // setUrl. (MapLibre's reload skips errored tiles and never puts them
        // in the reuse cache; what keeps this fail-closed is that every
        // failure path hides the destination layers, which drops the errored
        // tiles.) Clear the mark only when a refetch was actually issued;
        // the post-idle check below still fails this inspection if a source
        // errors again during the attempt.
        requiredDestinationSources.forEach(sourceId => {
          if (!failedDestinationSources.has(sourceId)) return;
          const source = map.getSource(sourceId);
          if (source?.setUrl) {
            failedDestinationSources.delete(sourceId);
            source.setUrl(source.url);
          }
        });
        setLayerVisibility(destinationLayerIds, true);
        map.once("idle", () => {
          if (sequence !== inspectSequence) return;
          if ([...requiredDestinationSources].some(source => failedDestinationSources.has(source))) {
            setLayerVisibility(destinationLayerIds, false);
            renderInspectionError(lngLat, updateHash);
            return;
          }
          inspectVisibleLocation(lngLat, updateHash, destinationLayerIds, sequence);
          setLayerVisibility(destinationLayerIds, false);
          updateMapStatus();
        });
      }

      function renderInspectionError(lngLat, updateHash) {
        if (!persistentMapError) {
          reportMapError(new Error(t("lookupUnavailable")));
        }
        if (!locationMarker) locationMarker = new maplibregl.Marker({ color: "#172033" });
        locationMarker.setLngLat(lngLat).addTo(map);
        if (updateHash) {
          updateInspectionHash(lngLat);
        }
        document.getElementById("location-coordinates").textContent =
          t("coordsLine", `${lngLat.lat.toFixed(6)}, ${lngLat.lng.toFixed(6)}`);
        document.getElementById("clicked-place").replaceChildren();
        document.getElementById("intersection-summary").textContent = t("cannotEvaluate");
        const message = document.createElement("p");
        message.className = "status";
        message.textContent = t("lookupFailed");
        const results = document.getElementById("location-results");
        results.replaceChildren(message);
        results.setAttribute("aria-busy", "false");
        const dialog = document.getElementById("location-dialog");
        if (!dialog.open) dialog.showModal();
      }

      // Open the dialog at click time, before an automatic zoom or PMTiles
      // lookup can make the interaction feel ignored. Rendered marker fields
      // are already enough for the place chip; the compact catalog fills in
      // its address and the destination cards when the lookup completes.
      function renderInspectionLoading(lngLat, updateHash) {
        if (!locationMarker) locationMarker = new maplibregl.Marker({ color: "#172033" });
        locationMarker.setLngLat(lngLat).addTo(map);
        if (updateHash) updateInspectionHash(lngLat);
        document.getElementById("location-coordinates").textContent =
          t("coordsLine", `${Number(lngLat.lat).toFixed(6)}, ${Number(lngLat.lng).toFixed(6)}`);
        renderClickedPlaces(inspectionMarkerFeatures ?? []);
        document.getElementById("intersection-summary").textContent = t("loadingDetails");
        const results = document.getElementById("location-results");
        results.replaceChildren();
        results.setAttribute("aria-busy", "true");
        const dialog = document.getElementById("location-dialog");
        if (!dialog.open) dialog.showModal();
      }

      function renderCatalogLoading() {
        locationMarker?.remove();
        document.getElementById("location-coordinates").textContent = "";
        document.getElementById("clicked-place").replaceChildren();
        document.getElementById("intersection-summary").textContent = t("loadingDetails");
        const results = document.getElementById("location-results");
        results.replaceChildren();
        results.setAttribute("aria-busy", "true");
        document.getElementById("map-status").textContent = t("loadingDetails");
        const dialog = document.getElementById("location-dialog");
        if (!dialog.open) dialog.showModal();
      }

      function centerSharedInspection(lngLat, sequence) {
        map.once("idle", () => {
          if (sequence === inspectSequence) inspectLocation(lngLat, true, sequence);
        });
        map.easeTo({
          center: lngLat,
          zoom: Math.max(map.getZoom(), inspectZoom),
          duration: 450
        });
      }

      // A destination dot renders as a small circle; query a padded box so it
      // remains practical to tap, then keep only the nearest marker. A marker
      // click becomes a canonical #place inspection at that marker's exact
      // coordinates; an ordinary map click remains an exact #at inspection.
      const dotHitPadding = coarsePointerMedia.matches ? 14 : 9;

      function markerFeaturesAt(point) {
        const layers = placeLayerIds.filter(id => map.getLayer(id));
        if (!layers.length) return [];
        const features = map.queryRenderedFeatures([
          [point.x - dotHitPadding, point.y - dotHitPadding],
          [point.x + dotHitPadding, point.y + dotHitPadding]
        ], { layers });
        const distance = feature => {
          const projected = map.project(feature.geometry.coordinates);
          return (projected.x - point.x) ** 2 + (projected.y - point.y) ** 2;
        };
        // Duplicate buffered-tile copies are removed before choosing the one
        // nearest marker, so only the canonical selected place is labelled.
        return dedupeFeatures(features.sort((left, right) => distance(left) - distance(right)))
          .slice(0, 1);
      }

      function inspectVisibleLocation(lngLat, updateHash, destinationLayerIds, sequence) {
        const point = map.project(lngLat);
        const markerFeatures = inspectionMarkerFeatures ?? [];
        const destinationFeatures = destinationLayerIds.length
          ? map.queryRenderedFeatures(point, { layers: destinationLayerIds })
          : [];
        const catalogPromise = markerFeatures.length || destinationFeatures.length
          ? loadPlaceCatalog()
          : Promise.resolve({ destinations: [] });
        catalogPromise
          .then(placeCatalog => {
            if (sequence === inspectSequence) {
              renderLocationResults(
                lngLat, markerFeatures, destinationFeatures, placeCatalog.destinations
              );
            }
          })
          .catch(error => {
            if (sequence !== inspectSequence) return;
            reportMapError(error);
            console.error(error);
            renderInspectionError(lngLat, updateHash);
          });
      }

      function applySharedInspectionFilters(parameters) {
        // Validate mode and language before requirements; the requirements
        // parser itself validates fully before mutating any service state.
        const sharedMode = parseSharedViewMode(parameters);
        const sharedLang = parseSharedLang(parameters);
        const sharedRequirements = parameters.get("requirements");
        if (sharedRequirements !== null) applySharedRequirements(sharedRequirements);
        if (sharedMode !== null) viewMode = sharedMode;
        applyLanguage(sharedLang ?? "lt");
      }

      let suppressedDialogCloses = 0;

      function closeDialogForHashRestore(dialog) {
        if (!dialog.open) return;
        suppressedDialogCloses += 1;
        dialog.close();
      }

      function rejectSharedInspection(error) {
        reportMapError(error);
        inspectionOrigin = undefined;
        inspectionPlaceId = undefined;
        inspectionMarkerFeatures = undefined;
        inspectionPending = false;
        inspectSequence += 1;
        locationMarker?.remove();
        setLayerVisibility(
          [...destinationRecords.values()].map(record => record.destinationLayer),
          false
        );
        const dialog = document.getElementById("location-dialog");
        closeDialogForHashRestore(dialog);
      }

      function applyLocationHash() {
        const parameters = new URLSearchParams(location.hash.slice(1));
        const atValue = parameters.get("at");
        const placeValue = parameters.get("place");
        if (atValue !== null && placeValue !== null) {
          rejectSharedInspection(new Error(t("errInvalidPlace", placeValue)));
          return;
        }
        if (placeValue !== null) {
          if (!placeValue.length) {
            rejectSharedInspection(new Error(t("errInvalidPlace", placeValue)));
            return;
          }
          try {
            applySharedInspectionFilters(parameters);
          } catch (error) {
            rejectSharedInspection(error);
            return;
          }
          const dialog = document.getElementById("location-dialog");
          closeDialogForHashRestore(dialog);
          clearTimeout(viewHashTimer);
          const sequence = ++inspectSequence;
          inspectionOrigin = undefined;
          inspectionPlaceId = placeValue;
          inspectionMarkerFeatures = undefined;
          inspectionPending = true;
          refreshMap();
          renderCatalogLoading();
          loadPlaceCatalog()
            .then(placeCatalog => {
              if (sequence !== inspectSequence) return;
              const markerFeature = catalogMarkerFeature(placeValue, placeCatalog);
              const [lng, lat] = markerFeature.geometry.coordinates;
              inspectionPlaceId = placeValue;
              inspectionMarkerFeatures = [markerFeature];
              inspectionOrigin = { lng, lat };
              inspectionPending = false;
              renderInspectionLoading(inspectionOrigin, true);
              centerSharedInspection(inspectionOrigin, sequence);
            })
            .catch(error => {
              if (sequence === inspectSequence) rejectSharedInspection(error);
            });
          return;
        }
        const coordinates = atValue?.split(",");
        if (atValue !== null) {
          if (coordinates.length !== 2) {
            rejectSharedInspection(new Error(t("errOutsideBounds")));
            return;
          }
          // An arbitrary shared point stays an exact-coordinate inspection;
          // it never acquires a nearby marker merely because the current
          // camera happens to render one.
          const lngLat = { lng: Number(coordinates[0]), lat: Number(coordinates[1]) };
          const [minLon, minLat, maxLon, maxLat] = metadata.bbox;
          if (!Number.isFinite(lngLat.lng) || !Number.isFinite(lngLat.lat) ||
              lngLat.lng < minLon || lngLat.lng > maxLon ||
              lngLat.lat < minLat || lngLat.lat > maxLat) {
            rejectSharedInspection(new Error(t("errOutsideBounds")));
            return;
          }
          try {
            applySharedInspectionFilters(parameters);
          } catch (error) {
            rejectSharedInspection(error);
            return;
          }
          const dialog = document.getElementById("location-dialog");
          closeDialogForHashRestore(dialog);
          clearTimeout(viewHashTimer);
          const sequence = ++inspectSequence;
          inspectionOrigin = undefined;
          inspectionPlaceId = undefined;
          inspectionMarkerFeatures = [];
          inspectionPending = false;
          refreshMap();
          inspectionOrigin = lngLat;
          renderInspectionLoading(inspectionOrigin, true);
          centerSharedInspection(inspectionOrigin, sequence);
          return;
        }
        // View-only hash: restore requirements, view mode, language, and
        // camera; no inspect dialog. Same validate-then-apply order as the
        // at= path.
        try {
          const sharedMode = parseSharedViewMode(parameters);
          const sharedLang = parseSharedLang(parameters);
          const sharedRequirements = parameters.get("requirements");
          if (sharedRequirements !== null) applySharedRequirements(sharedRequirements);
          if (sharedMode !== null) viewMode = sharedMode;
          applyLanguage(sharedLang ?? "lt");
        } catch (error) {
          reportMapError(error);
          return;
        }
        const dialog = document.getElementById("location-dialog");
        closeDialogForHashRestore(dialog);
        clearTimeout(viewHashTimer);
        inspectionOrigin = undefined;
        inspectionPlaceId = undefined;
        inspectionMarkerFeatures = undefined;
        inspectionPending = false;
        inspectSequence += 1;
        locationMarker?.remove();
        const view = parameters.get("view")?.split(",").map(Number);
        if (view && view.length === 3 && view.every(Number.isFinite)) {
          // Validate like the at= path: a mangled coordinate (e.g. a
          // truncated paste producing lat 547) must degrade gracefully, not
          // throw inside MapLibre's LngLat constructor and masquerade as a
          // data error while skipping the refreshMap below.
          const [lng, lat, zoom] = view;
          const [minLon, minLat, maxLon, maxLat] = metadata.bbox;
          if (lng >= minLon && lng <= maxLon && lat >= minLat && lat <= maxLat) {
            try {
              map.jumpTo({ center: [lng, lat], zoom });
            } catch (error) {
              console.warn("ignoring unusable view hash", error);
            }
          } else {
            console.warn("ignoring view hash outside the coverage bounds");
          }
        }
        refreshMap();
      }

      Promise.all([
        fetchJson("metadata.json"),
        new Promise(resolve => map.once("load", resolve))
      ]).then(([loadedMetadata]) => {
        metadata = loadedMetadata;
        // Date the always-used basemap source too, so the snapshot date
        // stays visible even when no access layer is active (the
        // attribution control ignores unused sources).
        map.getSource(baseSource).attribution = snapshotAttribution();
        createServiceControls();
        addAccessNetwork();
        addDetailLayers();
        addPlaceLayers();
        const [minLon, minLat, maxLon, maxLat] = metadata.bbox;
        map.setMaxBounds([[minLon, minLat], [maxLon, maxLat]]);
        // Desktop with the panel open: pad the country fit so central
        // Lithuania is not hidden under the overlay. Only this initial fit —
        // collapsing or expanding later never moves the user's camera, and
        // a view= hash below overrides the fit either way.
        const panelWidth = mapPanel.getBoundingClientRect().width;
        const fitPadding =
          !mobileMedia.matches &&
          mapPanel.dataset.collapsed === "false" &&
          map.getContainer().clientWidth - panelWidth >= 480
            ? { top: 8, right: Math.round(panelWidth) + 16, bottom: 8, left: 8 }
            : 8;
        map.fitBounds([[minLon, minLat], [maxLon, maxLat]], { padding: fitPadding, duration: 0 });

        renderSummaryText();
        localizeMapControls();
        document.getElementById("lang-toggle").addEventListener("click", () =>
          setLanguage(lang === "lt" ? "en" : "lt")
        );
        document.querySelectorAll("[data-view]").forEach(button =>
          button.addEventListener("click", () => applyQuickView(button.dataset.view))
        );
        document.querySelectorAll("#view-switcher button").forEach(button =>
          button.addEventListener("click", () => {
            viewMode = button.dataset.mode;
            refreshMap();
          })
        );
        // Tapping the collapsed chip row opens the panel (§3.4). Expanding
        // hides the row itself, so hand focus to the toggle — a keyboard
        // user keeps a focus point that collapses the panel again.
        document.getElementById("panel-selection-summary").addEventListener("click", () => {
          setPanelCollapsed(false);
          document.getElementById("panel-toggle").focus();
        });
        document.getElementById("panel-toggle").addEventListener("click", () =>
          setPanelCollapsed(mapPanel.dataset.collapsed !== "true")
        );
        document.getElementById("panel-done").addEventListener("click", () => {
          setPanelCollapsed(true);
          document.getElementById("panel-toggle").focus();
        });
        document.getElementById("dialog-close").addEventListener("click", () =>
          document.getElementById("location-dialog").close()
        );
        // Light dismiss: clicking the backdrop closes the dialog. On the
        // mobile bottom sheet the dimmed map above it becomes the big
        // one-handed close target; Esc and the × button work as before.
        // The rect check keeps clicks on the dialog's own padding (which
        // also target the dialog element) from closing it. `click` fires with
        // the mouseup coordinates at the common ancestor of press and release,
        // so a text-selection drag that ends over the backdrop would otherwise
        // count as a backdrop click — require the pointer to have gone DOWN on
        // the backdrop too.
        const backdropHit = (dialog, x, y) => {
          const rect = dialog.getBoundingClientRect();
          return x < rect.left || x > rect.right || y < rect.top || y > rect.bottom;
        };
        let dialogPressOnBackdrop = false;
        document.getElementById("location-dialog").addEventListener("pointerdown", event => {
          const dialog = event.currentTarget;
          dialogPressOnBackdrop = event.target === dialog &&
            backdropHit(dialog, event.clientX, event.clientY);
        });
        document.getElementById("location-dialog").addEventListener("click", event => {
          const dialog = event.currentTarget;
          if (event.target !== dialog) return;
          if (dialogPressOnBackdrop && backdropHit(dialog, event.clientX, event.clientY)) {
            dialog.close();
          }
          dialogPressOnBackdrop = false;
        });
        document.getElementById("location-dialog").addEventListener("close", () => {
          if (suppressedDialogCloses > 0) {
            suppressedDialogCloses -= 1;
            return;
          }
          inspectionOrigin = undefined;
          inspectionPlaceId = undefined;
          inspectionMarkerFeatures = undefined;
          inspectionPending = false;
          inspectSequence += 1;
          locationMarker?.remove();
          setLayerVisibility(
            [...destinationRecords.values()].map(record => record.destinationLayer),
            false
          );
          // Closing during the below-z12 auto-zoom invalidates its idle
          // callback, so restore the ordinary selection status here instead
          // of leaving “Loading…” behind indefinitely.
          updateMapStatus();
          // Fall back from the inspect-share hash to the view-state hash.
          scheduleViewHash();
        });
        map.on("click", event => {
          const markerFeature = markerFeaturesAt(event.point)[0];
          if (!markerFeature) {
            inspectionPlaceId = undefined;
            inspectionMarkerFeatures = [];
            inspectionPending = false;
            inspectLocation(event.lngLat);
            return;
          }
          inspectPlaceMarker(markerFeature);
        });
        // Fine-pointer cursor affordances: the default pan hand on plain
        // basemap, a pointer over the clickable things — destination dots
        // (same padded hit box as the click, so hover and click always agree)
        // and rendered access-network segments. One mousemove handler, hit-tested
        // at most once per animation frame. Touch/coarse-pointer devices
        // cannot use hover, so they install no hit-test handler at all.
        //
        // In the L3 fast path both access layers stay permanently visible
        // with a constant ["has","g"] filter — a group's visibility rides in
        // its feature-state colour alpha, so queryRenderedFeatures alone
        // would report every network segment (essentially the whole routable
        // network) as hoverable. Gate on the pushed per-group state instead:
        // a segment reads as clickable only when its group is actually
        // painted (non-transparent) in one of the access layers, the L3
        // equivalent of the old per-view visibility + reachable setFilter.
        if (hoverMedia.matches) {
          const groupRendered = group => {
            const state = lastGroupStates && lastGroupStates[group];
            return !!state && (state.uc !== "rgba(0,0,0,0)" || state.mc !== "rgba(0,0,0,0)");
          };
          const overRenderedSegment = point => {
            const layers = accessLayerIds.filter(id => map.getLayer(id));
            return layers.length > 0 &&
              map.queryRenderedFeatures(point, { layers }).some(feature => groupRendered(feature.id));
          };
          let hoverPoint;
          let hoverScheduled = false;
          map.on("mousemove", event => {
            // Keep the stock grab cursor and skip per-frame hit-tests while
            // drag-panning or while inertia/programmatic movement continues.
            if (event.originalEvent.buttons || map.isMoving()) {
              map.getCanvas().style.cursor = "";
              return;
            }
            hoverPoint = event.point;
            if (hoverScheduled) return;
            hoverScheduled = true;
            requestAnimationFrame(() => {
              hoverScheduled = false;
              // Movement can begin between the mousemove and this frame.
              if (map.isMoving()) {
                map.getCanvas().style.cursor = "";
                return;
              }
              const overDot = markerFeaturesAt(hoverPoint).length > 0;
              const overSegment = !overDot && overRenderedSegment(hoverPoint);
              map.getCanvas().style.cursor = overDot || overSegment ? "pointer" : "";
            });
          });
          map.on("mouseout", () => { map.getCanvas().style.cursor = ""; });
        }
        map.on("moveend", scheduleViewHash);
        window.addEventListener("hashchange", () => {
          // replaceState never fires hashchange, but stay safe against
          // user edits that match our last write.
          if (location.hash === lastWrittenHash) return;
          applyLocationHash();
        });
        if (mobileMedia.matches) collapseCompactAttribution();
        refreshMap();
        applyLocationHash();
        // A hashless load gets its canonical hash immediately (no debounce),
        // so the URL reflects the default state from first paint.
        if (location.hash.length <= 1) updateViewHash();
      }).catch(error => {
        document.getElementById("summary-text").textContent = t("couldNotLoad", error);
        reportMapError(error);
        console.error(error);
      });
    </script>
  </body>
</html>
