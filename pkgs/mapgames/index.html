<!doctype html>
<html lang="lt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; worker-src 'self'"
    >
    <title>Kasdienio pasiekiamumo žemėlapis</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="assets/maplibre-gl.css">
    <script src="assets/maplibre-gl-csp.js"></script>
    <script src="assets/pmtiles.js"></script>
    <script src="assets/basemaps.js"></script>
    <style>
      :root {
        color-scheme: light;
        --paper: rgb(248 250 252 / 96%);
        --ink: #172033;
        --muted: #596579;
        --border: #c9d2df;
      }
      html, body, #map { width: 100%; height: 100%; margin: 0; }
      body { color: var(--ink); font-family: system-ui, sans-serif; }
      button, input, select { font: inherit; }
      button, select { color: inherit; }
      button { touch-action: manipulation; }
      .map-panel {
        position: absolute;
        z-index: 2;
        top: .65rem;
        right: .65rem;
        box-sizing: border-box;
        width: min(27rem, calc(100vw - 4.5rem));
        max-height: calc(100vh - 1.3rem);
        overflow: auto;
        padding: .85rem 1rem;
        border: 1px solid rgb(58 73 96 / 22%);
        border-radius: .45rem;
        background: var(--paper);
        box-shadow: 0 1px 8px rgb(20 30 48 / 18%);
      }
      .panel-title-row { display: flex; align-items: start; gap: .7rem; }
      .panel-title-row h1 { flex: 1; }
      .panel-toggle, .panel-done { display: none; }
      /* Small, discoverable-but-quiet language switch in the title row. */
      .lang-toggle {
        flex: 0 0 auto;
        padding: .22rem .5rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #ffffff;
        color: var(--muted);
        font-size: .78rem;
        font-weight: 700;
        cursor: pointer;
      }
      .lang-toggle:hover { background: #eef4fb; }
      .panel-content { min-height: 0; }
      /* Collapsed-mobile chip row; a button so tapping it expands the panel. */
      .panel-selection-summary {
        display: none;
        width: 100%;
        margin: 0;
        padding: 0;
        border: 0;
        background: none;
        text-align: left;
        cursor: pointer;
      }
      .map-panel h1 { margin: 0 0 .25rem; font-size: 1.2rem; }
      .map-panel > p { margin: .3rem 0; line-height: 1.35; }
      .quick-actions { display: flex; flex-wrap: wrap; gap: .35rem; margin: .7rem 0; }
      .quick-actions button {
        padding: .28rem .55rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #ffffff;
        cursor: pointer;
      }
      .quick-actions button:hover { background: #eef4fb; }
      .service-list { display: grid; gap: .45rem; }
      .service-card {
        --service-color: #765;
        --service-foreground: white;
        padding: .55rem .65rem;
        border: 1px solid var(--border);
        border-left: .35rem solid var(--service-color);
        border-radius: .4rem;
        background: rgb(255 255 255 / 64%);
      }
      .service-card[data-enabled="false"] { opacity: .66; }
      .service-heading { display: flex; align-items: center; gap: .4rem; }
      .service-heading strong { flex: 1; }
      .service-count { color: var(--muted); font-size: .76rem; }
      .service-description { margin: .16rem 0 .42rem; color: var(--muted); font-size: .8rem; }
      .service-controls { display: flex; align-items: center; flex-wrap: wrap; gap: .35rem .55rem; }
      .preset-choices { display: flex; flex-wrap: wrap; gap: .3rem; }
      .preset-choices button {
        padding: .27rem .4rem;
        border: 1px solid var(--border);
        border-radius: .3rem;
        background: white;
        cursor: pointer;
      }
      .preset-choices button[aria-pressed="true"] {
        color: var(--service-foreground);
        background: var(--service-color);
        border-color: var(--service-color);
      }
      .preset-choices button:disabled { cursor: default; opacity: .55; }
      /* Pills inside unchecked cards must not look half-active. */
      .service-card[data-enabled="false"] .preset-choices button[aria-pressed="true"] {
        color: inherit;
        background: white;
        border-color: var(--border);
      }
      .view-switcher { display: flex; gap: .3rem; margin: .55rem 0 .45rem; }
      /* An author display beats the UA [hidden] rule; restate it. */
      .view-switcher[hidden] { display: none; }
      .view-switcher button {
        flex: 1;
        min-height: 2.2rem;
        padding: .28rem .3rem;
        border: 1px solid var(--border);
        border-radius: .4rem;
        background: #ffffff;
        cursor: pointer;
      }
      .view-switcher button[aria-checked="true"] {
        color: white;
        background: var(--ink);
        border-color: var(--ink);
      }
      .view-switcher button:disabled { cursor: default; opacity: .55; }
      .access-legend { display: grid; gap: .3rem; margin: 0 0 .6rem; font-size: .82rem; }
      /* An author display beats the UA [hidden] rule; restate it. */
      .access-legend[hidden] { display: none; }
      .legend-title { color: var(--muted); }
      .legend-row { display: flex; flex-wrap: wrap; gap: .35rem .8rem; }
      .legend-item { display: inline-flex; align-items: center; gap: .3rem; }
      .legend-item.active { outline: 2px solid var(--ink); outline-offset: 2px; border-radius: .15rem; }
      .legend-swatch {
        width: 1.15rem;
        height: .6rem;
        border: 1px solid rgb(23 32 51 / 30%);
        border-radius: .15rem;
      }
      .summary-chip {
        display: inline-flex;
        align-items: center;
        gap: .3rem;
        margin-right: .3rem;
        padding: .1rem .45rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #ffffff;
        font-size: .78rem;
        vertical-align: middle;
      }
      .chip-swatch {
        width: .7rem;
        height: .7rem;
        border: 1px solid rgb(23 32 51 / 30%);
        border-radius: .2rem;
      }
      .status { min-height: 1.2em; color: #374861; font-size: .88rem; }
      dialog {
        box-sizing: border-box;
        width: min(42rem, calc(100vw - 2rem));
        max-height: min(46rem, calc(100vh - 2rem));
        overflow: auto;
        padding: 1rem 1.1rem 1.2rem;
        border: 1px solid #8fa0b6;
        border-radius: .5rem;
        color: var(--ink);
        background: #ffffff;
        box-shadow: 0 8px 35px rgb(20 30 48 / 32%);
      }
      dialog::backdrop { background: rgb(15 23 42 / 42%); }
      .dialog-header { display: flex; align-items: start; gap: .7rem; }
      .dialog-header div { flex: 1; }
      .dialog-header h2 { margin: 0; font-size: 1.25rem; }
      .dialog-header p { margin: .2rem 0; color: var(--muted); }
      .dialog-close {
        width: 2rem;
        height: 2rem;
        border: 1px solid var(--border);
        border-radius: 50%;
        background: white;
        cursor: pointer;
      }
      .intersection-summary {
        margin: .75rem 0;
        padding: .55rem .7rem;
        border-radius: .4rem;
        background: #eef4fb;
        font-weight: 700;
      }
      .place-chips { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .35rem; }
      .place-chip {
        display: inline-flex;
        align-items: center;
        gap: .25rem;
        padding: .18rem .45rem;
        border: 1px solid var(--border);
        border-left: .3rem solid var(--service-color, var(--border));
        border-radius: 999px;
        background: #ffffff;
        font-size: .8rem;
      }
      .status-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .25rem; }
      .status-pill {
        padding: .12rem .42rem;
        border-radius: 999px;
        color: white;
        background: #64748b;
        font-size: .75rem;
        font-weight: 700;
      }
      .result-card.pass .status-pill { background: #237242; }
      .result-card.fail .status-pill { background: #9a403b; }
      .result-list { display: grid; gap: .55rem; }
      .result-card {
        --service-color: #765;
        padding: .6rem .7rem;
        border: 1px solid var(--border);
        border-left: .35rem solid var(--service-color);
        border-radius: .4rem;
      }
      .result-card h3 { margin: 0; font-size: 1rem; }
      .result-card p { margin: .25rem 0; }
      .destination-list { display: grid; gap: .35rem; margin: .45rem 0 0; padding: 0; list-style: none; }
      .destination-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: .6rem;
        padding: .35rem .45rem;
        border-radius: .35rem;
        background: #f8fafc;
      }
      .destination-list a { color: #7a421e; }
      .route-link {
        flex: 0 0 auto;
        padding: .2rem .45rem;
        border: 1px solid var(--border);
        border-radius: .3rem;
        background: #ffffff;
        text-decoration: none;
      }
      .destination-kind { color: var(--muted); font-size: .78rem; }
      .destination-details { flex: 1; min-width: 0; }
      .destination-details summary { cursor: pointer; }
      .destination-place-card {
        margin: .3rem 0 .1rem;
        padding: .35rem .5rem;
        border-left: .25rem solid var(--border);
        border-radius: .3rem;
        background: #ffffff;
      }
      .destination-place-card p { margin: .2rem 0; font-size: .85rem; }
      .more-destinations { margin-top: .4rem; }
      .clicked-place {
        margin: .7rem 0;
        padding: .55rem .7rem;
        border: 1px solid var(--border);
        border-radius: .4rem;
        background: #f8fafc;
      }
      .clicked-place h3 { margin: 0 0 .25rem; font-size: 1rem; }
      .clicked-place p { margin: .2rem 0; }
      .clicked-place a { color: #7a421e; }
      .maplibregl-ctrl-attrib { font-family: system-ui, sans-serif; }
      /* The attribution button is enlarged on coarse-pointer and narrow
         viewports; stock MapLibre CSS lets the ⓘ icon tile across an
         enlarged button, so pin it unconditionally. */
      .maplibregl-ctrl-attrib-button {
        background-repeat: no-repeat;
        background-position: center;
        background-size: 1.5rem;
      }
      .maplibregl-ctrl-bottom-right { right: auto; left: .5rem; }
      /* Desktop: the overlay panel collapses to a compact pill in the same
         corner — same toggle button and glanceable chip summary as the
         mobile sheet, so both form factors share one mental model. The
         query is the exact complement of the mobile layout query below,
         keeping these rules off the mobile sheet entirely. */
      @media not ((max-width: 640px) or ((max-height: 520px) and (max-width: 950px))) {
        .panel-toggle {
          display: inline-flex;
          flex: 0 0 auto;
          align-items: center;
          gap: .35rem;
          padding: .22rem .6rem;
          border: 1px solid var(--border);
          border-radius: 999px;
          background: #ffffff;
          color: var(--muted);
          font-size: .78rem;
          font-weight: 700;
          cursor: pointer;
        }
        .panel-toggle:hover { background: #eef4fb; }
        /* Chevron points where the content will go: down to expand the
           top-anchored panel, up to collapse it (mobile mirrors this). */
        .panel-toggle-icon {
          font-size: .7rem;
          transition: transform .16s ease;
          transform: rotate(180deg);
        }
        .map-panel[data-collapsed="false"] .panel-toggle-icon { transform: none; }
        .map-panel[data-collapsed="true"] {
          width: auto;
          max-width: min(27rem, calc(100vw - 4.5rem));
        }
        .map-panel[data-collapsed="true"] .panel-content { display: none; }
        .map-panel[data-collapsed="true"] .panel-selection-summary {
          display: block;
          margin: .45rem 0 0;
          color: var(--muted);
          font-size: .82rem;
        }
        .map-panel[data-collapsed="true"] .panel-selection-summary:hover { color: var(--ink); }
      }
      @media (pointer: coarse) {
        .quick-actions button,
        .view-switcher button,
        .preset-choices button,
        .route-link,
        .destination-details summary,
        .more-destinations > summary { min-height: 2.75rem; }
        .route-link { display: inline-flex; align-items: center; }
        .service-heading { min-height: 2.75rem; }
        .lang-toggle { min-width: 2.75rem; min-height: 2.75rem; }
        .service-heading input { width: 1.4rem; height: 1.4rem; }
        .dialog-close,
        .maplibregl-ctrl-group button,
        .maplibregl-ctrl-attrib-button { width: 2.75rem; height: 2.75rem; }
        /* Stock inner padding assumes a 24px button; clear the 44px one. */
        .maplibregl-ctrl-attrib.maplibregl-compact-show { padding-right: 3rem; }
      }
      @media (max-width: 640px), (max-height: 520px) and (max-width: 950px) {
        .map-panel {
          display: flex;
          flex-direction: column;
          top: auto;
          bottom: calc(.5rem + env(safe-area-inset-bottom));
          left: .5rem;
          right: .55rem;
          width: auto;
          max-height: min(72dvh, 38rem);
          padding: .65rem .75rem;
          overflow: hidden;
          border-radius: .8rem;
        }
        .panel-title-row { align-items: center; }
        .map-panel h1 { margin: 0; font-size: 1.05rem; }
        .panel-toggle {
          display: inline-flex;
          min-width: 5.6rem;
          min-height: 2.75rem;
          align-items: center;
          justify-content: center;
          gap: .4rem;
          padding: .45rem .65rem;
          border: 1px solid var(--border);
          border-radius: 999px;
          background: white;
          cursor: pointer;
        }
        .panel-toggle-icon { font-size: .8rem; transition: transform .16s ease; }
        .map-panel[data-collapsed="false"] .panel-toggle-icon { transform: rotate(180deg); }
        .panel-selection-summary {
          display: block;
          min-height: 2.75rem;
          margin: .15rem 0 0;
          overflow: hidden;
          color: var(--muted);
          font-size: .84rem;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .panel-content {
          overflow: auto;
          overscroll-behavior: contain;
          padding: .2rem .05rem calc(.15rem + env(safe-area-inset-bottom));
        }
        .map-panel[data-collapsed="true"] .panel-content { display: none; }
        .map-panel[data-collapsed="true"] { max-height: none; }
        .map-panel[data-collapsed="false"] .panel-selection-summary { display: none; }
        .map-panel[data-collapsed="false"] .panel-content { margin-top: .25rem; }
        .map-panel > .panel-content > #summary-text { margin-top: .15rem; }
        .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: .45rem; }
        .quick-actions button,
        .view-switcher button,
        .preset-choices button,
        .panel-done {
          min-height: 2.75rem;
          padding: .48rem .62rem;
        }
        .quick-actions button { border-radius: .45rem; }
        .preset-choices { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); width: 100%; }
        .preset-choices button { width: 100%; }
        .service-list { gap: .55rem; }
        .service-card { padding: .65rem .7rem; }
        .service-heading { min-height: 2.75rem; }
        .service-heading input { width: 1.4rem; height: 1.4rem; margin: 0; }
        .panel-done {
          display: flex;
          width: 100%;
          align-items: center;
          justify-content: center;
          margin-top: .6rem;
          border: 0;
          border-radius: .45rem;
          color: white;
          background: #253b59;
          font-weight: 700;
          cursor: pointer;
        }
        dialog {
          width: 100%;
          max-width: none;
          max-height: min(84dvh, 48rem);
          margin: auto 0 0;
          padding: .8rem .85rem calc(1rem + env(safe-area-inset-bottom));
          border-right: 0;
          border-bottom: 0;
          border-left: 0;
          border-radius: .85rem .85rem 0 0;
        }
        .dialog-header {
          position: sticky;
          z-index: 1;
          top: -.8rem;
          align-items: center;
          margin: -.8rem -.85rem .55rem;
          padding: .8rem .85rem .55rem;
          background: white;
          border-radius: .85rem .85rem 0 0;
        }
        .dialog-close { width: 2.75rem; height: 2.75rem; flex: 0 0 auto; }
        .destination-list li { align-items: stretch; }
        .route-link { display: inline-flex; min-height: 2.75rem; align-items: center; }
        .clicked-place a { display: inline-flex; min-height: 2.75rem; align-items: center; }
        .destination-details summary { min-height: 2.75rem; }
        .more-destinations > summary { display: flex; min-height: 2.75rem; align-items: center; cursor: pointer; }
        /* Keep the expanded attribution clear of the top-left nav control:
           the compact control is content-box, so subtract its own padding
           (.5rem + 3rem) and margins on top of the 4.5rem nav zone. */
        .maplibregl-ctrl-attrib { max-width: calc(100vw - 9rem); }
        .maplibregl-ctrl-bottom-right {
          top: calc(.5rem + env(safe-area-inset-top));
          right: calc(.5rem + env(safe-area-inset-right));
          bottom: auto;
          left: auto;
        }
        .maplibregl-ctrl-top-left {
          top: env(safe-area-inset-top);
          left: env(safe-area-inset-left);
        }
        .maplibregl-ctrl-group button,
        .maplibregl-ctrl-attrib-button { width: 2.75rem; height: 2.75rem; }
        /* Stock inner padding assumes a 24px button; clear the 44px one. */
        .maplibregl-ctrl-attrib.maplibregl-compact-show { padding-right: 3rem; }
      }
    </style>
  </head>
  <body>
    <div id="map" aria-label="Kasdienių paslaugų pasiekiamumo žemėlapis"></div>
    <section class="map-panel" aria-label="Pasiekiamumo sąlygos" data-collapsed="true">
      <div class="panel-title-row">
        <h1 id="app-title">Kasdienis pasiekiamumas</h1>
        <button class="lang-toggle" id="lang-toggle" type="button" lang="en" aria-label="Switch to English">EN</button>
        <button
          class="panel-toggle"
          id="panel-toggle"
          type="button"
          aria-controls="panel-content"
          aria-expanded="false"
        >
          <span id="panel-toggle-label">Filtrai</span>
          <span class="panel-toggle-icon" aria-hidden="true">▲</span>
        </button>
      </div>
      <button class="panel-selection-summary" id="panel-selection-summary" type="button" aria-label="Išskleisti filtrus" aria-live="polite">Įkeliami filtrai…</button>
      <div class="panel-content" id="panel-content">
        <p id="summary-text">Įkeliami sugeneruoti duomenys…</p>
        <div class="quick-actions" id="quick-actions" role="group" aria-label="Greitos peržiūros">
          <button type="button" data-view="coffee">Tik kava ir maistas</button>
          <button type="button" data-view="everyday">Kasdienybė pėsčiomis</button>
          <button type="button" data-view="all">Visos paslaugos</button>
          <button type="button" data-view="clear">Išvalyti</button>
        </div>
        <div class="view-switcher" id="view-switcher" role="radiogroup" aria-label="Žemėlapio rodinys">
          <button type="button" role="radio" data-mode="bands" aria-checked="false">Trukmės zonos</button>
          <button type="button" role="radio" data-mode="intersect" aria-checked="false">Tenkina visas</button>
          <button type="button" role="radio" data-mode="score" aria-checked="false">Kiek tenkina</button>
        </div>
        <div class="access-legend" id="access-legend" hidden></div>
        <div class="service-list" id="service-list"></div>
        <p class="status" id="map-status" aria-live="polite">Įkeliamas žemėlapis…</p>
        <button class="panel-done" id="panel-done" type="button">Rodyti žemėlapį</button>
      </div>
    </section>

    <dialog id="location-dialog" aria-labelledby="location-dialog-title">
      <div class="dialog-header">
        <div>
          <h2 id="location-dialog-title">Pasiekiamumas iš šios vietos</h2>
          <p id="location-coordinates"></p>
        </div>
        <button class="dialog-close" id="dialog-close" type="button" aria-label="Užverti">×</button>
      </div>
      <div id="clicked-place"></div>
      <p class="intersection-summary" id="intersection-summary" aria-live="polite"></p>
      <div class="result-list" id="location-results" aria-live="polite" aria-busy="false"></div>
    </dialog>

    <script>
      maplibregl.setWorkerUrl("assets/maplibre-gl-csp-worker.js");
      const pmtilesProtocol = new pmtiles.Protocol();
      maplibregl.addProtocol("pmtiles", pmtilesProtocol.tile);

      // Palette per docs/unified-access-layer.md §3.3 (CVD-safe, light
      // basemap): Okabe-Ito service hues; markers use independent dark
      // variants of the same identifying hue (they are not band steps).
      const serviceStyles = {
        // White text fails WCAG AA on the first three Okabe-Ito hues
        // (2.25:1, 3.87:1, and 3.42:1 respectively). Keep the identifying
        // hues, but pair each pressed preset with a foreground that is at
        // least 4.5:1; fuel is the one hue on which white remains clearer.
        coffee: { color: "#E69F00", marker: "#8A5F00", foreground: "#0f172a" },
        hospital: { color: "#D55E00", marker: "#AD4A00", foreground: "#0f172a" },
        supermarket: { color: "#009E73", marker: "#00664A", foreground: "#0f172a" },
        fuel: { color: "#0072B2", marker: "#004E7A", foreground: "#ffffff" }
      };
      // Band ramps: discrete lightness steps of each service hue, darkest =
      // smallest minutes (§3.3). The deliberately wide steps stay ordered
      // under color-vision deficiencies and remain distinct on the light
      // basemap; keyed by the requirement keys of metadata.access_network.
      const bandRamps = {
        coffee_walk: { 5: "#3F2800", 10: "#654100", 20: "#8D5C00" },
        hospital_drive: { 15: "#350900", 30: "#5B1900", 45: "#842C00", 60: "#B04700" },
        supermarket_walk: { 10: "#003D2C", 20: "#006D50" },
        supermarket_drive: { 10: "#006D50" },
        fuel_drive: { 10: "#002D49", 20: "#005E90" }
      };
      const bandOpacity = 0.9;
      // Intersection ink: outside every service hue, hue-free hence
      // CVD-neutral, maximal contrast on the light basemap (§3.3).
      const intersectInk = "#172033";
      const intersectOpacity = 0.95;
      // The old #8a93a3 at 35% composited to only 1.41:1 against white and
      // was effectively lost among pale roads and landcover. This darker
      // neutral at 90% is still subordinate to intersectInk, but reaches
      // 4.71:1 on white and 3.08:1 on the custom forest fill. The legend
      // uses the same composited color below.
      const contextGray = "#596579";
      const contextOpacity = 0.9;
      // Two permanent access layers over the one network source-layer
      // (lowzoom-fastpath §3.2): "access-under" renders the intersect
      // view's context union, "access-main" renders bands / intersect ink /
      // score. Styling is per attribute-map group via feature-state — one

      function syncMobileMode() {
        // Mobile always starts collapsed (bottom sheet over the map);
        // desktop restores this session's last choice, expanded by default.
        setPanelCollapsed(mobileMedia.matches || storedPanelCollapsed());
      }

      function collapseCompactAttribution() {
        // MapLibre auto-opens the compact attribution; on narrow viewports the
        // expanded box would cover the zoom controls, so start it collapsed.
        // Mirrors the collapsed state _toggleAttribution itself produces.
        const attribution = document.querySelector(".maplibregl-ctrl-attrib");
        if (attribution?.classList.contains("maplibregl-compact-show")) {
          attribution.setAttribute("open", "");
          attribution.classList.remove("maplibregl-compact-show");
        }
      }

      mobileMedia.addEventListener("change", syncMobileMode);
      // Apply the initial collapse state before the map loads so a restored
      // desktop "collapsed" choice never flashes the full panel.
      syncMobileMode();

      function fetchJson(url) {
        return fetch(url).then(response => {
          if (!response.ok) throw new Error(`${url}: HTTP ${response.status}`);
          return response.json();
        });
      }

      function presetKey(service, mode, minutes) {
        return `${service}|${mode}|${minutes}`;
      }

      function selectedPreset(service) {
        const state = serviceState.get(service.id);
        return service.presets.find(preset => `${preset.mode}:${preset.minutes}` === state.preset);
      }

      function activeRequirements() {
        return metadata.services.filter(service => serviceState.get(service.id).enabled);
      }

      // One entry per active requirement: at most one per service (N <= 4;
      // supermarket walk/drive are alternatives via the single preset, §3.2).
      function selectionDetails() {
        return activeRequirements().map(service => {
          const preset = selectedPreset(service);
          return { service, preset, key: `${service.id}_${preset.mode}` };
        });
      }

      function networkRequirement(key) {
        const requirement = metadata.access_network.requirements
          .find(candidate => candidate.key === key);
        if (!requirement) throw new Error(`unknown network requirement: ${key}`);
        return requirement;
      }

      // Preference vs. effective mode (§3.2): |R|=0 renders nothing, |R|=1
      // is always bands, bands with |R|>=2 coerces to intersect — without
      // touching the stored preference, so toggling a second service on and
      // off round-trips bands -> intersect -> bands.
      function effectiveViewMode(selectionCount) {
        if (selectionCount === 0) return null;
        if (selectionCount === 1) return "bands";
        if (viewMode === "bands") return "intersect";
        return viewMode;
      }

      function requirementsParam() {
        return activeRequirements().map(service => {
          const preset = selectedPreset(service);
          return `${service.id}:${preset.mode}:${preset.minutes}`;
        }).join(",");
      }

      // The URL records the *effective* mode so shared links reproduce what
      // the sharer saw (§3.4); with nothing selected there is no effective
      // mode and the parameter is omitted.
      function effectiveModeParam() {
        const mode = effectiveViewMode(activeRequirements().length);
        return mode ? `&mode=${mode}` : "";
      }

      // Mirrors the mode= style: omitted whenever it adds nothing — the
      // default language stays out of the URL, so old links stay clean.
      function langParam() {
        return lang === "lt" ? "" : `&lang=${lang}`;
      }

      function inspectionHash(lngLat) {
        const origin = inspectionPlaceId === undefined
          ? `at=${lngLat.lng.toFixed(6)},${lngLat.lat.toFixed(6)}`
          : `place=${encodeURIComponent(inspectionPlaceId)}`;
        return `#${origin}` +
          `&requirements=${requirementsParam()}${effectiveModeParam()}${langParam()}`;
      }

      let lastWrittenHash = "";

      function writeHash(hash) {
        try {
          // Safari throttles history API calls (~100/30s) and throws; a
          // dropped write only leaves a slightly stale URL, so swallow it.
          history.replaceState(null, "", `${location.pathname}${location.search}${hash}`);
          lastWrittenHash = hash;
        } catch (error) {
          console.warn("could not update the URL hash", error);
        }
      }

      function updateInspectionHash(lngLat) {
        writeHash(inspectionHash(lngLat));
      }

      let viewHashTimer;

      function updateViewHash() {
        // The inspect-share hash (#at=... or #place=...) owns the URL while a
        // location is inspected; view state fills it the rest of the time.
        if (!metadata || inspectionPending || inspectionOrigin ||
            document.getElementById("location-dialog").open) {
          return;
        }
        const center = map.getCenter();
        writeHash(
          `#requirements=${requirementsParam()}` +
          `&view=${center.lng.toFixed(5)},${center.lat.toFixed(5)},${map.getZoom().toFixed(2)}` +
          effectiveModeParam() + langParam()
        );
      }

      function scheduleViewHash() {
        clearTimeout(viewHashTimer);
        viewHashTimer = setTimeout(updateViewHash, 250);
      }

      function applySharedRequirements(value) {
        const selected = value === "" ? [] : value.split(",").map(item => {
          const [serviceId, mode, minutesText, ...extra] = item.split(":");
          const minutes = Number(minutesText);
          const service = metadata.services.find(candidate => candidate.id === serviceId);
          const preset = service?.presets.find(candidate =>
            candidate.mode === mode && candidate.minutes === minutes
          );
          if (!service || !preset || extra.length) {
            throw new Error(t("errInvalidRequirement", item));
          }
          return { service, preset };
        });
        metadata.services.forEach(service => {
          serviceState.get(service.id).enabled = false;
        });
        selected.forEach(({ service, preset }) => {
          const state = serviceState.get(service.id);
          state.enabled = true;
          state.preset = `${preset.mode}:${preset.minutes}`;
        });
      }

      // Shared-link view mode (§3.4). The `view` hash key already carries
      // the camera, so the mode travels as `mode=`; absent means "derived
      // default" (§3.2), keeping older shared links working unchanged.
      // Validation is split from application so the caller can validate the
      // whole hash before mutating any state: an invalid mode must not leave
      // already-applied requirements behind without a refreshMap.
      function parseSharedViewMode(parameters) {
        const shared = parameters.get("mode");
        if (shared !== null && !viewModes.includes(shared)) {
          throw new Error(t("errInvalidMode", shared));
        }
        return shared;
      }

      // Shared-link language: same strict validate-then-apply contract as
      // mode=. Absent means the default (Lithuanian).
      function parseSharedLang(parameters) {
        const shared = parameters.get("lang");
        if (shared !== null && !languages.includes(shared)) {
          throw new Error(t("errInvalidLang", shared));
        }
        return shared;
      }

      // Every string the DOM holds statically; rerun on language change.
      // The document ships with the Lithuanian defaults, so the initial
      // applyLanguage("lt") is a no-op by design.
      function applyStaticStrings() {
        document.documentElement.lang = lang;
        document.title = t("docTitle");
        document.getElementById("map").setAttribute("aria-label", t("mapAria"));
        mapPanel.setAttribute("aria-label", t("panelAria"));
        document.getElementById("app-title").textContent = t("appTitle");
        const langToggle = document.getElementById("lang-toggle");
        langToggle.textContent = t("langToggle");
        langToggle.setAttribute("aria-label", t("langToggleAria"));
        langToggle.setAttribute("lang", lang === "lt" ? "en" : "lt");
        document.getElementById("panel-toggle-label").textContent =
          mapPanel.dataset.collapsed === "true" ? t("filters") : t("closePanel");
        const selectionSummary = document.getElementById("panel-selection-summary");
        selectionSummary.setAttribute("aria-label", t("expandFilters"));
        document.getElementById("quick-actions").setAttribute("aria-label", t("quickViews"));
        const quickViewTexts = { coffee: "qvCoffee", everyday: "qvEveryday", all: "qvAll", clear: "qvClear" };
        document.querySelectorAll("#quick-actions button").forEach(button => {
          button.textContent = t(quickViewTexts[button.dataset.view]);
        });
        document.getElementById("view-switcher").setAttribute("aria-label", t("viewModeAria"));
        const modeTexts = { bands: "modeBands", intersect: "modeIntersect", score: "modeScore" };
        document.querySelectorAll("#view-switcher button").forEach(button => {
          button.textContent = t(modeTexts[button.dataset.mode]);
        });
        document.getElementById("panel-done").textContent = t("viewMap");
        document.getElementById("location-dialog-title").textContent = t("dialogTitle");
        document.getElementById("dialog-close").setAttribute("aria-label", t("closeDialog"));
        if (!metadata && !persistentMapError) {
          selectionSummary.textContent = t("loadingFilters");
          document.getElementById("summary-text").textContent = t("loadingData");
          document.getElementById("map-status").textContent = t("loadingMap");
        }
        localizeMapControls();
      }

      // MapLibre's stock control buttons carry English tooltips; restate
      // them from the string table (there is no public setLocale to do it).
      function localizeMapControls() {
        [
          [".maplibregl-ctrl-zoom-in", "zoomIn"],
          [".maplibregl-ctrl-zoom-out", "zoomOut"],
          [".maplibregl-ctrl-geolocate", "geolocate"],
          [".maplibregl-ctrl-attrib-button", "toggleAttribution"]
        ].forEach(([selector, key]) => {
          const control = document.querySelector(selector);
          if (!control) return;
          control.title = t(key);
          control.setAttribute("aria-label", t(key));
        });
      }

      function renderSummaryText() {
        const totalPlaces = metadata.services.reduce((sum, service) => sum + service.place_count, 0);
        document.getElementById("summary-text").textContent = t("summaryLoaded", totalPlaces);
      }

      function updateServiceCardTexts() {
        metadata.services.forEach(service => {
          const card = document.querySelector(`[data-service="${service.id}"]`);
          card.querySelector(".service-heading strong").textContent = serviceLabel(service);
          card.querySelector(".service-count").textContent = t("placesCount", service.place_count);
          card.querySelector(".service-description").textContent = serviceDescription(service);
          card.querySelector(".preset-choices")
            .setAttribute("aria-label", t("travelTimeAria", serviceLabel(service)));
          card.querySelectorAll("button[data-role='preset']").forEach(button => {
            const [mode, minutes] = button.dataset.preset.split(":");
            button.textContent = presetLabel({ mode, minutes: Number(minutes) });
          });
        });
      }

      // Language application without a map re-render (for the hash path,
      // where refreshMap follows anyway).
      function applyLanguage(next) {
        if (next === lang) return;
        lang = next;
        applyStaticStrings();
        if (metadata) {
          updateServiceCardTexts();
          renderSummaryText();
          updateDetailLanguage();
        }
        renderMapError();
      }

      // The toggle: re-render everything live and put lang= in the URL.
      // refreshMap re-renders the legend/status/switcher, and re-runs the
      // open inspection (whose own hash write carries the language); the
      // view-hash write below covers the no-inspection case immediately.
      function setLanguage(next) {
        if (next === lang) return;
        applyLanguage(next);
        if (!metadata) return;
        refreshMap();
        if (!inspectionOrigin && !document.getElementById("location-dialog").open) {
          updateViewHash();
        }
      }

      function inspectionOffset() {
        if (!mobileMedia.matches) return [0, 0];
        const mapRect = map.getContainer().getBoundingClientRect();
        const visibleHeight = Math.max(
          0,
          mapPanel.getBoundingClientRect().top - mapRect.top
        );
        return [0, visibleHeight / 2 - mapRect.height / 2];
      }

      function setLayerVisibility(layerIds, visible) {
        layerIds.forEach(layerId =>
          map.setLayoutProperty(layerId, "visibility", visible ? "visible" : "none")
        );
      }

      function createServiceControls() {
        const list = document.getElementById("service-list");
        metadata.services.forEach(service => {
          const defaultPreset = service.presets.find(preset => preset.minutes === 10) || service.presets[0];
          serviceState.set(service.id, {
            enabled: service.id === "coffee",
            preset: `${defaultPreset.mode}:${defaultPreset.minutes}`
          });

          const card = document.createElement("section");
          card.className = "service-card";
          card.dataset.service = service.id;
          card.style.setProperty("--service-color", serviceStyles[service.id].color);
          card.style.setProperty("--service-foreground", serviceStyles[service.id].foreground);

          const heading = document.createElement("label");
          heading.className = "service-heading";
          const enabled = document.createElement("input");
          enabled.type = "checkbox";
          enabled.checked = service.id === "coffee";
          enabled.dataset.role = "enabled";
          const title = document.createElement("strong");
          title.textContent = serviceLabel(service);
          const count = document.createElement("span");
          count.className = "service-count";
          count.textContent = t("placesCount", service.place_count);
          heading.append(enabled, title, count);

          const description = document.createElement("p");
          description.className = "service-description";
          description.textContent = serviceDescription(service);

          const controls = document.createElement("div");
          controls.className = "service-controls";
          const presets = document.createElement("div");
          presets.className = "preset-choices";
          presets.setAttribute("role", "group");
          presets.setAttribute("aria-label", t("travelTimeAria", serviceLabel(service)));
          service.presets.forEach(preset => {
            const button = document.createElement("button");
            button.type = "button";
            button.dataset.role = "preset";
            button.dataset.preset = `${preset.mode}:${preset.minutes}`;
            button.textContent = presetLabel(preset);
            button.setAttribute(
              "aria-pressed",
              String(button.dataset.preset === `${defaultPreset.mode}:${defaultPreset.minutes}`)
            );
            presets.append(button);
          });
          controls.append(presets);

          card.append(heading, description, controls);
          card.addEventListener("change", event => {
            const target = event.target;
            const state = serviceState.get(service.id);
            if (target.dataset.role === "enabled") state.enabled = target.checked;
            refreshMap();
          });
          card.addEventListener("click", event => {
            const target = event.target.closest("button[data-role='preset']");
            if (!target || target.disabled) return;
            serviceState.get(service.id).preset = target.dataset.preset;
            refreshMap();
          });
          list.append(card);
        });
      }

      // The real-world corridor width doubles on screen with every zoom
      // step; past ~z15 that floods whole blocks with no added information
      // (reported as the map growing "too thick" when zoomed in). The
      // visible access views cap the on-screen width so high zooms read as
      // a street highlight; the invisible destination hit corridors carry
      // the reachability verdict, so they always stay geographically true
      // (maxWidthPx defaults to uncapped).
      // Six CSS pixels stays legible over the basemap without swallowing
      // buildings or merging parallel streets. Geographic corridor width is
      // still preserved by the invisible destination hit layers below.
      const corridorWidthCapPx = 6;

      function corridorLineWidth(mode, maxWidthPx = Infinity) {
        const bufferMeters = metadata.geometry.corridor_buffer_meters[mode];
        const latitude = (metadata.bbox[1] + metadata.bbox[3]) / 2;
        const latitudeScale = Math.max(Math.cos(latitude * Math.PI / 180), .01);
        const stops = [];
        for (let zoom = 6; zoom <= 18; zoom += 2) {
          // MapLibre's zoom-zero world is 512 CSS pixels wide.
          const metersPerPixel = 78_271.516964 * latitudeScale / (2 ** zoom);
          stops.push(zoom, Math.min(maxWidthPx, Math.max(1.25, 2 * bufferMeters / metersPerPixel)));
        }
        return ["interpolate", ["exponential", 2], ["zoom"], ...stops];
      }

      function lineLayout() {
        return {
          visibility: "none",
          "line-cap": "butt",
          "line-join": "miter",
          "line-miter-limit": 2
        };
      }

      function addAccessNetwork() {
        const network = metadata.access_network;
        // Access is thematic context, never label ink. Insert it immediately
        // below the first basemap symbol layer so road/place labels remain
        // legible; high-zoom detail labels and service dots are added later.
        const firstLabelLayer = map.getStyle().layers.find(layer => layer.type === "symbol")?.id;
        const addBelowLabels = layer => firstLabelLayer
          ? map.addLayer(layer, firstLabelLayer)
          : map.addLayer(layer);
        map.addSource("access", {
          type: "vector",
          url: `pmtiles://${new URL(network.file, location.href).href}`,
          attribution: snapshotAttribution(),
          // Feature id = attribute-map group id (lowzoom-fastpath §3.2).
          // Many features share one id by design; feature-state is an
          // id-keyed map consulted per feature.
          promoteId: { [network.layer]: "g" }
        });
        // Both access layers stay visible from load with a constant
        // filter: every view and threshold switch is a per-group
        // feature-state repaint (refreshMap) — no setFilter, no visibility
        // flips, no re-tessellation. Until the first refreshMap() writes
        // group states, the paint expressions' coalesce defaults hold
        // every group at opacity 0, so nothing flashes.
        accessLayerIds.forEach(id => {
          const prefix = id === "access-under" ? "u" : "m";
          addBelowLabels({
            id,
            type: "line",
            source: "access",
            "source-layer": network.layer,
            filter: ["has", "g"],
            layout: { ...lineLayout(), visibility: "visible" },
            paint: {
              "line-color": ["to-color",
                ["coalesce", ["feature-state", `${prefix}c`], "rgba(0,0,0,0)"]],
              // refreshMap enables only the layers used by the effective
              // mode. A constant zero lets MapLibre's drawLine path return
              // before touching the dense geometry; zero-duration
              // transitions make that early-out immediate.
              "line-opacity": 0,
              "line-opacity-transition": { duration: 0, delay: 0 },
              // Plain (non-data-driven) zoom curve; refreshMap swaps it
              // per effective mode via setPaintProperty — cheap repaint,
              // no re-layout. These are the visible corridor layers, so the
              // on-screen width caps at corridorWidthCapPx (the invisible
              // destination hit corridors below stay uncapped).
              "line-width": corridorLineWidth("walk", corridorWidthCapPx)
            }
          });
        });
        metadata.destination_tiles.forEach(tile => {
          const destinationSource = `destination-${tile.service}-${tile.mode}`;
          destinationSourceIds.add(destinationSource);
          map.addSource(destinationSource, {
            type: "vector",
            url: `pmtiles://${new URL(tile.file, location.href).href}`
          });
          Object.entries(tile.layers).forEach(([minutesText, sourceLayer]) => {
            const minutes = Number(minutesText);
            const record = {
              destinationLayer: `destinations-${tile.service}-${tile.mode}-${minutes}`,
              destinationSource,
              minutes,
              mode: tile.mode,
              service: tile.service
            };
            map.addLayer({
              id: record.destinationLayer,
              type: "line",
              source: destinationSource,
              "source-layer": sourceLayer,
              minzoom: inspectZoom,
              layout: lineLayout(),
              paint: {
                "line-color": "#000000",
                "line-opacity": 0,
                "line-width": corridorLineWidth(record.mode)
              }
            });
            destinationRecords.set(presetKey(tile.service, tile.mode, minutes), record);
          });
        });
      }

      function detailLocalizedField(property) {
        return lang === "en"
          ? ["coalesce", ["get", `${property}:en`], ["get", property], ["get", `${property}:lt`]]
          : ["coalesce", ["get", `${property}:lt`], ["get", property], ["get", `${property}:en`]];
      }

      function detailTextField() {
        const properName = detailLocalizedField("name");
        const houseName = detailLocalizedField("housename");
        const houseNumber = ["get", "housenumber"];
        const primaryName = ["coalesce", properName, houseName];
        const fallback = ["coalesce", properName, houseName, houseNumber];
        const hasPrimaryName = ["any",
          ["has", "name"], ["has", "name:lt"], ["has", "name:en"],
          ["has", "housename"], ["has", "housename:lt"], ["has", "housename:en"]
        ];
        const combinedAtZ18 = ["case",
          ["all", hasPrimaryName, ["has", "housenumber"]],
          ["concat", primaryName, " · ", houseNumber],
          fallback
        ];
        // z15-16: proper building names only. z17: strict proper name,
        // house name, number priority. z18: retain that priority but append
        // the number when a named building/address has one.
        return ["step", ["zoom"], properName, 17, fallback, 18, combinedAtZ18];
      }

      function poiTextField() {
        const label = ["coalesce", detailLocalizedField("name"), ["get", "brand"], ["get", "operator"]];
        const restrictedSuffix = ["case",
          ["==", ["get", "access"], "customers"], lang === "en" ? " · customers" : " · klientams",
          ["==", ["get", "access"], "private"], lang === "en" ? " · private" : " · privati",
          ""
        ];
        return ["case",
          ["all", ["==", ["get", "class"], "playground"],
            ["match", ["get", "access"], ["private", "customers"], true, false]],
          ["concat", label, restrictedSuffix],
          label
        ];
      }

      function transitTextField() {
        return detailLocalizedField("name");
      }

      function microMarkerField() {
        const localized = lang === "en"
          ? { bicycle_parking: "BIKE", compressed_air: "AIR", shelter: "SHEL", recycling: "REC", emergency_entrance: "ER", fountain: "FNT" }
          : { bicycle_parking: "DVIR.", compressed_air: "ORAS", shelter: "PAST.", recycling: "RŪŠ.", emergency_entrance: "SKUB.", fountain: "FONT." };
        return ["match", ["get", "class"],
          "toilets", "WC",
          "drinking_water", "H₂O",
          "bicycle_parking", localized.bicycle_parking,
          "compressed_air", localized.compressed_air,
          "shelter", localized.shelter,
          "recycling", localized.recycling,
          "information", "i",
          "defibrillator", "AED",
          "life_ring", "SOS",
          "emergency_entrance", localized.emergency_entrance,
          "fountain", localized.fountain,
          ""
        ];
      }

      function updateDetailLanguage() {
        detailLayerIds.forEach(id => {
          if (!map.getLayer(id)) return;
          map.setLayoutProperty(id, "text-field",
            id === "detail-micro-markers" ? microMarkerField() :
            id === "detail-micro-names" ? detailLocalizedField("name") :
            id.startsWith("detail-poi-") ? poiTextField() :
            id.startsWith("detail-transit-") ? transitTextField() :
            id === "detail-building-numbers" ? ["get", "housenumber"] : detailTextField());
        });
      }

      function addDetailLayers() {
        const details = metadata.details;
        map.addSource("details", {
          type: "vector",
          url: `pmtiles://${new URL(details.file, location.href).href}`
        });

        const firstBaseLabel = map.getStyle().layers.find(layer => layer.type === "symbol")?.id;
        const addBelowBaseLabels = layer => firstBaseLabel
          ? map.addLayer(layer, firstBaseLabel)
          : map.addLayer(layer);
        const named = ["any",
          ["has", "name"], ["has", "name:lt"], ["has", "name:en"],
          ["has", "housename"], ["has", "housename:lt"], ["has", "housename:en"]
        ];
        const commonLayout = (textField, padding) => ({
          "text-field": textField,
          "text-font": ["Noto Sans Medium"],
          "text-size": ["interpolate", ["linear"], ["zoom"], 15, 10.5, 17, 10.5, 18, 11.5],
          "text-max-width": 11,
          "text-padding": padding,
          "symbol-sort-key": ["get", "rank"]
        });
        const halo = {
          "text-halo-color": "rgba(255, 252, 245, 0.94)",
          "text-halo-width": 1.25,
          "text-halo-blur": 0.2
        };
        const poiPaint = {
          ...halo,
          "text-color": ["case",
            ["all", ["==", ["get", "class"], "playground"], ["==", ["get", "access"], "public"]],
            "#2f6248",
            "#3f4650"
          ]
        };
        const poiLayer = (id, tier, padding) => ({
          id,
          type: "symbol",
          source: "details",
          "source-layer": details.layers.poi_details,
          minzoom: tier,
          filter: ["==", ["get", "display_tier"], tier],
          layout: commonLayout(poiTextField(), padding),
          paint: poiPaint
        });
        const transitLayer = (id, tier, padding) => ({
          id,
          type: "symbol",
          source: "details",
          "source-layer": details.layers.transit_details,
          minzoom: tier,
          filter: ["==", ["get", "display_tier"], tier],
          layout: {
            ...commonLayout(transitTextField(), padding),
            "text-anchor": "top",
            "text-offset": [0, 0.9]
          },
          paint: { ...halo, "text-color": "#274f57" }
        });
        const transitMarkerLayer = (id, tier) => ({
          id,
          type: "circle",
          source: "details",
          "source-layer": details.layers.transit_details,
          minzoom: tier,
          filter: ["==", ["get", "display_tier"], tier],
          layout: { "circle-sort-key": ["get", "rank"] },
          paint: {
            "circle-radius": ["match", ["get", "kind"],
              ["station", "terminal"], 5, "halt", 3.8, 2.6],
            "circle-color": ["match", ["get", "kind"],
              ["station", "terminal"], "#fffaf1", "#37676d"],
            "circle-stroke-color": "#274f57",
            "circle-stroke-width": ["match", ["get", "kind"],
              ["station", "terminal"], 2, 1],
            "circle-opacity": 0.94,
            "circle-stroke-opacity": 1
          }
        });
        const microPaint = { ...halo, "text-color": "#4b4f56" };

        // MapLibre resolves cross-layer collisions from later style layers.
        // Insert low to high priority, all before the first basemap symbol, so
        // road/place labels always win while z18 can still be deliberately dense.
        // A POI-tagged building keeps its explicit house name/number in the
        // source. This lowest-priority layer makes that address eligible at
        // z17+ without allowing it to displace the POI at the same centroid.
        addBelowBaseLabels({
          id: "detail-building-poi-addresses",
          type: "symbol",
          source: "details",
          "source-layer": details.layers.building_details,
          minzoom: 17,
          filter: ["all", ["has", "has_poi"], ["any", named, ["has", "housenumber"]]],
          layout: commonLayout(detailTextField(),
            ["interpolate", ["linear"], ["zoom"], 17, 1.5, 18, 0.5]),
          paint: { ...halo, "text-color": "#68625b" }
        });
        // A compact neutral code remains useful when the optional proper name
        // cannot fit. Both layers are z18-only and lower priority than every
        // transit or basemap label; no category depends on color or sprites.
        addBelowBaseLabels({
          id: "detail-micro-names",
          type: "symbol",
          source: "details",
          "source-layer": details.layers.micro_details,
          minzoom: 18,
          filter: ["any", ["has", "name"], ["has", "name:lt"], ["has", "name:en"]],
          layout: {
            ...commonLayout(detailLocalizedField("name"), 1),
            "text-size": 10.5,
            "text-max-width": 9,
            "text-anchor": "top",
            "text-offset": [0, 1.15]
          },
          paint: microPaint
        });
        addBelowBaseLabels({
          id: "detail-micro-markers",
          type: "symbol",
          source: "details",
          "source-layer": details.layers.micro_details,
          minzoom: 18,
          layout: {
            ...commonLayout(microMarkerField(), 1),
            "text-size": 9.5,
            "text-max-width": 5
          },
          paint: microPaint
        });
        addBelowBaseLabels(poiLayer("detail-poi-micro", 18, 0.5));
        // Rings distinguish stations/terminals; progressively smaller solid
        // dots denote halts and local stops. Unnamed platform dots remain
        // marker-only and cannot appear before their z18 display tier.
        addBelowBaseLabels(transitMarkerLayer("detail-transit-markers-18", 18));
        addBelowBaseLabels(transitMarkerLayer("detail-transit-markers-17", 17));
        addBelowBaseLabels(transitMarkerLayer("detail-transit-markers-16", 16));
        addBelowBaseLabels(transitMarkerLayer("detail-transit-markers-15", 15));
        addBelowBaseLabels({
          id: "detail-building-numbers",
          type: "symbol",
          source: "details",
          "source-layer": details.layers.building_details,
          minzoom: 17,
          filter: ["all", ["has", "housenumber"], ["!", named], ["!", ["has", "has_poi"]]],
          layout: commonLayout(["get", "housenumber"], ["interpolate", ["linear"], ["zoom"], 17, 1.5, 18, 0.5]),
          paint: { ...halo, "text-color": "#68625b" }
        });
        addBelowBaseLabels(poiLayer("detail-poi-local", 17,
          ["interpolate", ["linear"], ["zoom"], 17, 1.5, 18, 0.5]));
        addBelowBaseLabels(transitLayer("detail-transit-local", 17,
          ["interpolate", ["linear"], ["zoom"], 17, 1.5, 18, 0.5]));
        addBelowBaseLabels(transitLayer("detail-transit-halt", 16,
          ["interpolate", ["linear"], ["zoom"], 16, 3, 18, 0.75]));
        addBelowBaseLabels(poiLayer("detail-poi-neighborhood", 16,
          ["interpolate", ["linear"], ["zoom"], 16, 3, 18, 0.75]));
        addBelowBaseLabels({
          id: "detail-building-names",
          type: "symbol",
          source: "details",
          "source-layer": details.layers.building_details,
          minzoom: 15,
          filter: ["all", named, ["!", ["has", "has_poi"]]],
          layout: commonLayout(detailTextField(),
            ["interpolate", ["linear"], ["zoom"], 15, 3, 17, 1.5, 18, 0.5]),
          paint: { ...halo, "text-color": "#3d3934" }
        });
        addBelowBaseLabels(poiLayer("detail-poi-major", 15,
          ["interpolate", ["linear"], ["zoom"], 15, 5, 18, 1]));
        addBelowBaseLabels(transitLayer("detail-transit-station", 15,
          ["interpolate", ["linear"], ["zoom"], 15, 5, 18, 1]));
      }

      function addPlaceLayers() {
        map.addSource("places", {
          type: "vector",
          url: `pmtiles://${new URL(metadata.places.file, location.href).href}`
        });
        metadata.services.forEach(service => {
          const layerId = `places-${service.id}`;
          map.addLayer({
            id: layerId,
            type: "circle",
            source: "places",
            "source-layer": metadata.places.layer,
            minzoom: Math.max(placeDisplayMinZoom, metadata.places.min_data_zoom),
            filter: ["==", ["get", "service"], service.id],
            layout: { visibility: "none" },
            paint: {
              // Vilnius can put hundreds of destinations in a z14 viewport.
              // Start compact and slightly translucent, then reach the full
              // street-level marker at z16 as viewport density drops. The
              // padded hit test below stays independent of these visuals.
              // A shared circle keeps dense views quiet; the clicked chip
              // supplies the textual service identity. If at-a-glance service
              // classification becomes a requirement, use distinct service
              // glyphs rather than stacking more paint around these dots.
              "circle-radius": ["interpolate", ["linear"], ["zoom"], 14, 2.25, 15, 3, 16, 4],
              "circle-color": "#fffaf1",
              "circle-opacity": ["interpolate", ["linear"], ["zoom"], 14, .72, 15, .86, 16, .94],
              "circle-stroke-color": serviceStyles[service.id].marker,
              // Service identity must survive pale roads, parks and the
              // translucent marker fill at the dense z14 reveal. Every
              // service stroke is >=3:1 on those fills when fully opaque.
              "circle-stroke-width": ["interpolate", ["linear"], ["zoom"], 14, 1, 15, 1.2, 16, 1.5],
              "circle-stroke-opacity": 1
            }
          });
          placeLayerIds.push(layerId);
        });
      }

      function refreshControls() {
        metadata.services.forEach(service => {
          const state = serviceState.get(service.id);
          const card = document.querySelector(`[data-service="${service.id}"]`);
          card.dataset.enabled = String(state.enabled);
          card.querySelector('[data-role="enabled"]').checked = state.enabled;
          card.querySelectorAll("button[data-role='preset']").forEach(button => {
            button.disabled = !state.enabled;
            button.setAttribute("aria-pressed", String(button.dataset.preset === state.preset));
          });
        });
      }

      // Canonical reachability test (§1.1), evaluated in JS over a group's
      // attribute map (absent key = unreachable). The map never reads
      // attributes from tiles: groups ship in
      // metadata.access_network.groups, indexed by the tiles' `g`.
      function groupReachable(attributes, selection) {
        const minutes = attributes[selection.key];
        return minutes !== undefined && minutes <= selection.preset.minutes;
      }

      // Push one feature-state per attribute-map group (N states total,
      // N = groups.length from metadata — never hardcoded). stateOf must
      // return both uc/mc keys so no stale state survives a mode or
      // threshold switch (setFeatureState merges partial states). States
      // are diffed against the last pushed value per group: MapLibre
      // re-uploads a bucket's whole paint array when any contained id
      // changes (no value-equality check), so a refreshMap that changes
      // nothing — or only some groups — must not resend the rest.
      let lastGroupStates;

      function setAccessGroupStates(stateOf) {
        const network = metadata.access_network;
        if (!lastGroupStates) lastGroupStates = new Array(network.groups.length);
        network.groups.forEach((attributes, group) => {
          const next = stateOf(attributes);
          const last = lastGroupStates[group];
          if (last && last.uc === next.uc && last.mc === next.mc) return;
          lastGroupStates[group] = next;
          map.setFeatureState(
            { source: "access", sourceLayer: network.layer, id: group },
            next
          );
        });
      }

      function setAccessLineWidth(width) {
        accessLayerIds.forEach(id => map.setPaintProperty(id, "line-width", width));
      }

      function setAccessLayerOpacities(mode) {
        // Keep shared layout buckets intact: constant paint opacity zero is
        // an immediate MapLibre draw early-out, unlike a visibility change
        // which reparses layout. Context exists only in intersect; main
        // exists in every non-empty effective view.
        map.setPaintProperty("access-under", "line-opacity", mode === "intersect" ? 1 : 0);
        map.setPaintProperty("access-main", "line-opacity", mode === null ? 0 : 1);
      }

      function combinedCorridorMode(selections) {
        // R7 judgment call: for a mixed selection the narrower walk corridor
        // is the honest width — a drive-width ribbon would overclaim walk
        // coverage.
        return selections.some(selection => selection.preset.mode === "walk") ? "walk" : "drive";
      }

      function bandColors(selection) {
        // Legend order assumes ascending minutes; generate.py emits them
        // sorted, but sort defensively rather than trust the data file.
        const minutes = [...networkRequirement(selection.key).minutes]
          .sort((left, right) => left - right);
        const ramp = bandRamps[selection.key];
        if (!ramp || minutes.some(value => !ramp[value])) {
          throw new Error(`no band ramp for ${selection.key} (${minutes})`);
        }
        return minutes.map(value => ({ minutes: value, color: ramp[value] }));
      }

      // Bands drawn for a selection: only the ramp bands within the chosen
      // preset, so switching 10 vs 20 min visibly changes the map — the
      // selected threshold is always the outermost drawn band, and the
      // largest preset shows the full nested ramp.
      function drawnBands(selection) {
        return bandColors(selection)
          .filter(band => band.minutes <= selection.preset.minutes);
      }

      function styleBandsView(selections) {
        // Bands is only effective with exactly one selection (§3.2).
        const focus = selections[0];
        const bands = drawnBands(focus);
        const bandColor = new Map(bands.map(band => [band.minutes, band.color]));
        setAccessGroupStates(attributes => {
          // Band values are disjoint by construction: a group carries one
          // ramp value per requirement, so reachable implies a drawn band
          // (bands ≤ preset). Unknown values fall through to hidden, like
          // the old match expression's transparent default.
          if (!groupReachable(attributes, focus)) return hiddenGroupState;
          const minutes = attributes[focus.key];
          const color = bandColor.get(minutes);
          if (color === undefined) return hiddenGroupState;
          return {
            uc: "rgba(0,0,0,0)",
            mc: withAlpha(color, bandOpacity)
          };
        });
        setAccessLineWidth(corridorLineWidth(focus.preset.mode, corridorWidthCapPx));
      }

      function styleIntersectView(selections) {
        setAccessGroupStates(attributes => {
          const meetsAll = selections.every(selection => groupReachable(attributes, selection));
          const meetsSome = meetsAll ||
            selections.some(selection => groupReachable(attributes, selection));
          // The under layer renders the whole union (including meets-all
          // groups) beneath the ink, exactly like the old any-filtered
          // context layer under the all-filtered intersect layer.
          return {
            uc: meetsSome ? withAlpha(contextGray, contextOpacity) : "rgba(0,0,0,0)",
            mc: meetsAll ? withAlpha(intersectInk, intersectOpacity) : "rgba(0,0,0,0)"
          };
        });
        setAccessLineWidth(corridorLineWidth(combinedCorridorMode(selections), corridorWidthCapPx));
      }

      function styleScoreView(selections) {
        const ramp = scoreRamp(selections.length);
        setAccessGroupStates(attributes => {
          const score = selections.reduce((sum, selection) =>
            sum + (groupReachable(attributes, selection) ? 1 : 0), 0);
          if (score < 1) return hiddenGroupState;
          return { uc: "rgba(0,0,0,0)", mc: withAlpha(ramp[score - 1], scoreOpacity) };
        });
        setAccessLineWidth(corridorLineWidth(combinedCorridorMode(selections), corridorWidthCapPx));
      }

      function refreshViewSwitcher(mode, selectionCount) {
        // §3.2: a single requirement always renders as bands, so the
        // switcher would be three dead buttons — hide the row entirely and
        // let the legend name the view. The stored viewMode preference is
        // untouched, so a second selection restores the previous choice.
        document.getElementById("view-switcher").hidden = selectionCount === 1;
        document.querySelectorAll("#view-switcher button").forEach(button => {
          // §3.2: bands with two or more selections is the multi-service
          // band compositing this rework removes — disabled, with a hint.
          const bandsLocked = button.dataset.mode === "bands" && selectionCount >= 2;
          button.disabled = bandsLocked;
          button.title = bandsLocked ? t("hintBandsLocked") : "";
          button.setAttribute("aria-checked", String(button.dataset.mode === mode));
        });
      }

      function legendItem(background, label, active = false) {
        const entry = document.createElement("span");
        entry.className = `legend-item${active ? " active" : ""}`;
        const swatch = document.createElement("span");
        swatch.className = "legend-swatch";
        swatch.style.background = background;
        const text = document.createElement("span");
        text.textContent = label;
        entry.append(swatch, text);
        return entry;
      }

      function renderLegend(mode, selections) {
        const legend = document.getElementById("access-legend");
        legend.replaceChildren();
        legend.hidden = !mode;
        if (!mode) return;
        const title = document.createElement("span");
        title.className = "legend-title";
        const row = document.createElement("span");
        row.className = "legend-row";
        if (mode === "bands") {
          const focus = selections[0];
          title.textContent = t("legendBandsTitle", serviceLabel(focus.service), focus.preset);
          drawnBands(focus).forEach(band => row.append(legendItem(
            withAlpha(band.color, bandOpacity),
            t("legendMinutes", band.minutes),
            band.minutes === focus.preset.minutes
          )));
        } else if (mode === "intersect") {
          title.textContent = t("legendSelectedTitle");
          row.append(legendItem(
            withAlpha(intersectInk, intersectOpacity),
            t("legendMeetsAll", selections.length)
          ));
          row.append(legendItem(withAlpha(contextGray, contextOpacity), t("legendMeetsSome")));
        } else {
          title.textContent = t("legendScoreTitle", selections.length);
          scoreRamp(selections.length).forEach((color, index) =>
            row.append(legendItem(
              withAlpha(color, scoreOpacity),
              t("legendScoreItem", index + 1, selections.length)
            )));
        }
        legend.append(title, row);
      }

      function summaryChip(label, background, title) {
        const chip = document.createElement("span");
        chip.className = "summary-chip";
        if (title) chip.title = title;
        const swatch = document.createElement("span");
        swatch.className = "chip-swatch";
        swatch.style.background = background;
        const text = document.createElement("span");
        text.textContent = label;
        chip.append(swatch, text);
        return chip;
      }

      function updateMapStatus() {
        const selections = selectionDetails();
        const mode = effectiveViewMode(selections.length);
        const summary = document.getElementById("panel-selection-summary");
        if (persistentMapError) {
          renderMapError();
          return;
        }
        document.getElementById("map-status").textContent = selections.length
          ? t("statusSelected", selections.length)
          : t("statusNone");
        // Collapsed-mobile legend (§3.4): a mode chip plus one mini-swatch
        // chip per active requirement; tapping the row expands the panel.
        summary.replaceChildren();
        if (!mode) {
          summary.textContent = t("summaryNone");
          return;
        }
        if (mode === "bands") {
          const colors = drawnBands(selections[0])
            .map(band => withAlpha(band.color, bandOpacity));
          summary.append(summaryChip(t("chipBands"), `linear-gradient(90deg, ${colors.join(", ")})`));
        } else if (mode === "intersect") {
          summary.append(summaryChip(
            t("chipAll", selections.length),
            withAlpha(intersectInk, intersectOpacity)
          ));
        } else {
          summary.append(summaryChip(t("chipScore"),
            `linear-gradient(90deg, ${scoreRamp(selections.length)
              .map(color => withAlpha(color, scoreOpacity)).join(", ")})`));
        }
        // With a single bands selection the travel mode and threshold ARE
        // the map, so surface them on the chip itself; multi-selection
        // chips keep the preset in the tooltip to stay glanceable.
        selections.forEach(selection => summary.append(summaryChip(
          mode === "bands"
            ? `${serviceLabel(selection.service)} · ${presetLabel(selection.preset)}`
            : serviceLabel(selection.service),
          serviceStyles[selection.service.id].color,
          `${serviceLabel(selection.service)} · ${presetLabel(selection.preset)}`
        )));
      }

      function refreshMap() {
        refreshControls();
        const selections = selectionDetails();
        const mode = effectiveViewMode(selections.length);
        refreshViewSwitcher(mode, selections.length);
        setAccessLayerOpacities(mode);
        // Per-group feature-state styling (lowzoom-fastpath §3.2): the
        // effective view is a pure function attribute map → (color,
        // opacity), pushed as N group states — a paint-buffer refresh over
        // loaded tiles; zero tile fetches, zero re-buckets.
        if (mode === "bands") styleBandsView(selections);
        else if (mode === "intersect") styleIntersectView(selections);
        else if (mode === "score") styleScoreView(selections);
        else setAccessGroupStates(() => hiddenGroupState);
        renderLegend(mode, selections);
        destinationRecords.forEach(record => setLayerVisibility([record.destinationLayer], false));
        metadata.services.forEach(service => {
          const state = serviceState.get(service.id);
          setLayerVisibility([`places-${service.id}`], state.enabled);
        });
        updateMapStatus();
        if (inspectionOrigin) inspectLocation(inspectionOrigin, true);
        else scheduleViewHash();
      }

      function applyQuickView(view) {
        metadata.services.forEach(service => {
          const state = serviceState.get(service.id);
          state.enabled = false;
          const defaultPreset = service.presets.find(preset => preset.minutes === 10) || service.presets[0];
          state.preset = `${defaultPreset.mode}:${defaultPreset.minutes}`;
        });
        const enable = id => { serviceState.get(id).enabled = true; };
        // Quick views pick the matching view mode too (§3.4); "clear" keeps
        // the stored preference.
        if (view === "coffee") {
          enable("coffee");
          viewMode = "bands";
        }
        if (view === "everyday") {
          enable("coffee");
          enable("supermarket");
          serviceState.get("coffee").preset = "walk:10";
          serviceState.get("supermarket").preset = "walk:10";
          viewMode = "intersect";
        }
        if (view === "all") {
          metadata.services.forEach(service => enable(service.id));
          viewMode = "score";
        }
        refreshMap();
      }

      function haversineMeters(origin, destination) {
        const radians = degrees => degrees * Math.PI / 180;
        const deltaLat = radians(destination.lat - origin.lat);
        const deltaLon = radians(destination.lon - origin.lng);
        const left = Math.sin(deltaLat / 2) ** 2;
        const right = Math.cos(radians(origin.lat)) * Math.cos(radians(destination.lat)) * Math.sin(deltaLon / 2) ** 2;
        return 6_371_000 * 2 * Math.atan2(Math.sqrt(left + right), Math.sqrt(1 - left - right));
      }

      function valhallaRouteUrl(origin, destination, mode) {
        const url = new URL("https://valhalla.openstreetmap.de/directions");
        url.searchParams.set("profile", mode === "walk" ? "pedestrian" : "car");
        url.searchParams.set("wps", [origin.lng, origin.lat, destination.lon, destination.lat].join(","));
        return url.href;
      }

      function destinationList(destinations, origin, mode) {
        const list = document.createElement("ol");
        list.className = "destination-list";
        destinations.forEach(destination => {
          const item = document.createElement("li");
          const label = document.createElement("span");
          label.textContent = destination.name || destination.brand ||
            t("unnamedKind", kindLabelTables[lang][destination.kind] || t("genericDestination"));
          const meta = document.createElement("span");
          meta.className = "destination-kind";
          const distance = haversineMeters(origin, destination);
          meta.textContent = t("destinationMeta", kindLabel(destination.kind), formatKm(distance));
          // Each destination expands in place to its place-card details —
          // one tap to open, one tap back to the list; the catalog entry
          // already carries every human-facing field rendered here.
          const details = document.createElement("details");
          details.className = "destination-details";
          const summary = document.createElement("summary");
          summary.append(label, document.createElement("br"), meta);
          details.append(summary);
          details.addEventListener("toggle", () => {
            if (!details.open || details.dataset.loaded) return;
            details.dataset.loaded = "true";
            const card = document.createElement("div");
            card.className = "destination-place-card";
            const values = placeDetailValues(destination);
            for (const value of values) {
              const paragraph = document.createElement("p");
              paragraph.textContent = value;
              card.append(paragraph);
            }
            if (!values.length) {
              const paragraph = document.createElement("p");
              paragraph.className = "destination-kind";
              paragraph.textContent = t("noPlaceDetails");
              card.append(paragraph);
            }
            details.append(card);
          });
          const link = document.createElement("a");
          link.className = "route-link";
          link.href = valhallaRouteUrl(origin, destination, mode);
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = t("liveRoute");
          item.append(details, link);
          list.append(item);
        });
        return list;
      }

      function loadPlaceCatalog() {
        if (!placeCatalogPromise) {
          placeCatalogPromise = fetchJson(metadata.places.catalog_file)
            .then(destinations => {
              if (!Array.isArray(destinations)) {
                throw new Error(`${metadata.places.catalog_file}: expected an array`);
              }
              const indexByPlaceId = new Map();
              destinations.forEach((destination, placeIndex) => {
                const placeId = destination?.place_id;
                if (typeof placeId !== "string" || !placeId.length) {
                  throw new Error(`${metadata.places.catalog_file}: place ${placeIndex} has no place_id`);
                }
                if (indexByPlaceId.has(placeId)) {
                  throw new Error(`${metadata.places.catalog_file}: duplicate place_id ${placeId}`);
                }
                indexByPlaceId.set(placeId, placeIndex);
              });
              return { destinations, indexByPlaceId };
            })
            .catch(error => {
              placeCatalogPromise = undefined;
              throw error;
            });
        }
        return placeCatalogPromise;
      }

      function catalogMarkerFeature(placeId, placeCatalog) {
        const placeIndex = placeCatalog.indexByPlaceId.get(placeId);
        const destination = placeCatalog.destinations[placeIndex];
        const [minLon, minLat, maxLon, maxLat] = metadata.bbox;
        if (placeIndex === undefined || !destination ||
            !metadata.services.some(service => service.id === destination.service) ||
            !Number.isFinite(destination.lon) || !Number.isFinite(destination.lat) ||
            destination.lon < minLon || destination.lon > maxLon ||
            destination.lat < minLat || destination.lat > maxLat) {
          throw new Error(t("errInvalidPlace", placeId));
        }
        return {
          type: "Feature",
          id: `place:${placeIndex}`,
          geometry: { type: "Point", coordinates: [destination.lon, destination.lat] },
          properties: { ...destination, place_index: placeIndex }
        };
      }

      function inspectPlaceMarker(markerFeature) {
        const placeIndex = Number(markerFeature.properties.place_index);
        const placeId = markerFeature.properties.place_id;
        const coordinates = markerFeature.geometry.coordinates;
        if (!Number.isSafeInteger(placeIndex) || placeIndex < 0 ||
            typeof placeId !== "string" || !placeId.length ||
            !Array.isArray(coordinates) || coordinates.length < 2 ||
            !coordinates.slice(0, 2).every(Number.isFinite)) {
          rejectSharedInspection(new Error(t("errInvalidPlace", placeId)));
          return;
        }

        // The tile feature is available synchronously, so acknowledge the
        // tap and label the selected place immediately. Do not query verdict
        // tiles at its MVT-quantized coordinate: resolve the original catalog
        // coordinate first, which is also what #place restores after reload.
        const approximateOrigin = { lng: coordinates[0], lat: coordinates[1] };
        inspectionPlaceId = placeId;
