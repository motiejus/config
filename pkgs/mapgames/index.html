<!doctype html>
<html lang="lt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; worker-src 'self'"
    >
    <title>Kasdienio pasiekiamumo žemėlapis</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="assets/maplibre-gl.css">
    <script src="assets/maplibre-gl-csp.js"></script>
    <script src="assets/pmtiles.js"></script>
    <script src="assets/basemaps.js"></script>
    <style>
      :root {
        color-scheme: light;
        --paper: rgb(248 250 252 / 96%);
        --ink: #172033;
        --muted: #596579;
        --border: #c9d2df;
      }
      html, body, #map { width: 100%; height: 100%; margin: 0; }
      body { color: var(--ink); font-family: system-ui, sans-serif; }
      button, input, select { font: inherit; }
      button, select { color: inherit; }
      button { touch-action: manipulation; }
      .map-panel {
        position: absolute;
        z-index: 2;
        top: .65rem;
        right: .65rem;
        box-sizing: border-box;
        width: min(27rem, calc(100vw - 4.5rem));
        max-height: calc(100vh - 1.3rem);
        overflow: auto;
        padding: .85rem 1rem;
        border: 1px solid rgb(58 73 96 / 22%);
        border-radius: .45rem;
        background: var(--paper);
        box-shadow: 0 1px 8px rgb(20 30 48 / 18%);
      }
      .panel-title-row { display: flex; align-items: start; gap: .7rem; }
      .panel-title-row h1 { flex: 1; }
      .panel-toggle, .panel-done { display: none; }
      /* Small, discoverable-but-quiet language switch in the title row. */
      .lang-toggle {
        flex: 0 0 auto;
        padding: .22rem .5rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #ffffff;
        color: var(--muted);
        font-size: .78rem;
        font-weight: 700;
        cursor: pointer;
      }
      .lang-toggle:hover { background: #eef4fb; }
      .panel-content { min-height: 0; }
      /* Collapsed-mobile chip row; a button so tapping it expands the panel. */
      .panel-selection-summary {
        display: none;
        width: 100%;
        margin: 0;
        padding: 0;
        border: 0;
        background: none;
        text-align: left;
        cursor: pointer;
      }
      .map-panel h1 { margin: 0 0 .25rem; font-size: 1.2rem; }
      .map-panel > p { margin: .3rem 0; line-height: 1.35; }
      .quick-actions { display: flex; flex-wrap: wrap; gap: .35rem; margin: .7rem 0; }
      .quick-actions button {
        padding: .28rem .55rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #ffffff;
        cursor: pointer;
      }
      .quick-actions button:hover { background: #eef4fb; }
      .service-list { display: grid; gap: .45rem; }
      .service-card {
        --service-color: #765;
        --service-foreground: white;
        padding: .55rem .65rem;
        border: 1px solid var(--border);
        border-left: .35rem solid var(--service-color);
        border-radius: .4rem;
        background: rgb(255 255 255 / 64%);
      }
      .service-card[data-enabled="false"] { opacity: .66; }
      .service-heading { display: flex; align-items: center; gap: .4rem; }
      .service-heading strong { flex: 1; }
      .service-count { color: var(--muted); font-size: .76rem; }
      .service-description { margin: .16rem 0 .42rem; color: var(--muted); font-size: .8rem; }
      .service-controls { display: flex; align-items: center; flex-wrap: wrap; gap: .35rem .55rem; }
      .preset-choices { display: flex; flex-wrap: wrap; gap: .3rem; }
      .preset-choices button {
        padding: .27rem .4rem;
        border: 1px solid var(--border);
        border-radius: .3rem;
        background: white;
        cursor: pointer;
      }
      .preset-choices button[aria-pressed="true"] {
        color: var(--service-foreground);
        background: var(--service-color);
        border-color: var(--service-color);
      }
      .preset-choices button:disabled { cursor: default; opacity: .55; }
      /* Pills inside unchecked cards must not look half-active. */
      .service-card[data-enabled="false"] .preset-choices button[aria-pressed="true"] {
        color: inherit;
        background: white;
        border-color: var(--border);
      }
      .view-switcher { display: flex; gap: .3rem; margin: .55rem 0 .45rem; }
      /* An author display beats the UA [hidden] rule; restate it. */
      .view-switcher[hidden] { display: none; }
      .view-switcher button {
        flex: 1;
        min-height: 2.2rem;
        padding: .28rem .3rem;
        border: 1px solid var(--border);
        border-radius: .4rem;
        background: #ffffff;
        cursor: pointer;
      }
      .view-switcher button[aria-checked="true"] {
        color: white;
        background: var(--ink);
        border-color: var(--ink);
      }
      .view-switcher button:disabled { cursor: default; opacity: .55; }
      .access-legend { display: grid; gap: .3rem; margin: 0 0 .6rem; font-size: .82rem; }
      /* An author display beats the UA [hidden] rule; restate it. */
      .access-legend[hidden] { display: none; }
      .legend-title { color: var(--muted); }
      .legend-row { display: flex; flex-wrap: wrap; gap: .35rem .8rem; }
      .legend-item { display: inline-flex; align-items: center; gap: .3rem; }
      .legend-item.active { outline: 2px solid var(--ink); outline-offset: 2px; border-radius: .15rem; }
      .legend-swatch {
        width: 1.15rem;
        height: .6rem;
        border: 1px solid rgb(23 32 51 / 30%);
        border-radius: .15rem;
      }
      .summary-chip {
        display: inline-flex;
        align-items: center;
        gap: .3rem;
        margin-right: .3rem;
        padding: .1rem .45rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #ffffff;
        font-size: .78rem;
        vertical-align: middle;
      }
      .chip-swatch {
        width: .7rem;
        height: .7rem;
        border: 1px solid rgb(23 32 51 / 30%);
        border-radius: .2rem;
      }
      .status { min-height: 1.2em; color: #374861; font-size: .88rem; }
      .geolocation-status {
        position: absolute;
        z-index: 2;
        top: 4.8rem;
        left: 3.45rem;
        box-sizing: border-box;
        max-width: min(23rem, calc(100vw - 4.25rem));
        margin: 0;
        padding: .42rem .62rem;
        border: 1px solid rgb(58 73 96 / 22%);
        border-radius: .4rem;
        color: #253b59;
        background: var(--paper);
        box-shadow: 0 1px 6px rgb(20 30 48 / 16%);
        font-size: .82rem;
        line-height: 1.3;
        pointer-events: none;
      }
      .geolocation-status[hidden] { display: none; }
      /* Keep the device position visually distinct from every map-data
         colour. The translucent outlined circle is the reported error
         range, not a selectable area or an accessibility result. */
      .maplibregl-user-location-dot,
      .maplibregl-user-location-dot::before { background-color: #1267c4; }
      .maplibregl-user-location-accuracy-circle {
        box-sizing: border-box;
        border: 1px solid rgb(18 103 196 / 48%);
        background-color: rgb(18 103 196 / 16%);
      }
      dialog {
        box-sizing: border-box;
        width: min(42rem, calc(100vw - 2rem));
        max-height: min(46rem, calc(100vh - 2rem));
        overflow: auto;
        padding: 1rem 1.1rem 1.2rem;
        border: 1px solid #8fa0b6;
        border-radius: .5rem;
        color: var(--ink);
        background: #ffffff;
        box-shadow: 0 8px 35px rgb(20 30 48 / 32%);
      }
      dialog::backdrop { background: rgb(15 23 42 / 42%); }
      .dialog-header { display: flex; align-items: start; gap: .7rem; }
      .dialog-header div { flex: 1; }
      .dialog-header h2 { margin: 0; font-size: 1.25rem; }
      .dialog-header p { margin: .2rem 0; color: var(--muted); }
      .dialog-close {
        width: 2rem;
        height: 2rem;
        border: 1px solid var(--border);
        border-radius: 50%;
        background: white;
        cursor: pointer;
      }
      .intersection-summary {
        margin: .75rem 0;
        padding: .55rem .7rem;
        border-radius: .4rem;
        background: #eef4fb;
        font-weight: 700;
      }
      .place-chips { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .35rem; }
      .place-chip {
        display: inline-flex;
        align-items: center;
        gap: .25rem;
        padding: .18rem .45rem;
        border: 1px solid var(--border);
        border-left: .3rem solid var(--service-color, var(--border));
        border-radius: 999px;
        background: #ffffff;
        font-size: .8rem;
      }
      .status-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .25rem; }
      .status-pill {
        padding: .12rem .42rem;
        border-radius: 999px;
        color: white;
        background: #64748b;
        font-size: .75rem;
        font-weight: 700;
      }
      .result-card.pass .status-pill { background: #237242; }
      .result-card.fail .status-pill { background: #9a403b; }
      .result-list { display: grid; gap: .55rem; }
      .result-card {
        --service-color: #765;
        padding: .6rem .7rem;
        border: 1px solid var(--border);
        border-left: .35rem solid var(--service-color);
        border-radius: .4rem;
      }
      .result-card h3 { margin: 0; font-size: 1rem; }
      .result-card p { margin: .25rem 0; }
      .destination-list { display: grid; gap: .35rem; margin: .45rem 0 0; padding: 0; list-style: none; }
      .destination-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: .6rem;
        padding: .35rem .45rem;
        border-radius: .35rem;
        background: #f8fafc;
      }
      .destination-list a { color: #7a421e; }
      .route-link {
        flex: 0 0 auto;
        padding: .2rem .45rem;
        border: 1px solid var(--border);
        border-radius: .3rem;
        background: #ffffff;
        text-decoration: none;
      }
      .destination-kind { color: var(--muted); font-size: .78rem; }
      .destination-details { flex: 1; min-width: 0; }
      .destination-details summary { cursor: pointer; }
      .destination-place-card {
        margin: .3rem 0 .1rem;
        padding: .35rem .5rem;
        border-left: .25rem solid var(--border);
        border-radius: .3rem;
        background: #ffffff;
      }
      .destination-place-card p { margin: .2rem 0; font-size: .85rem; }
      .more-destinations { margin-top: .4rem; }
      .clicked-place {
        margin: .7rem 0;
        padding: .55rem .7rem;
        border: 1px solid var(--border);
        border-radius: .4rem;
        background: #f8fafc;
      }
      .clicked-place h3 { margin: 0 0 .25rem; font-size: 1rem; }
      .clicked-place p { margin: .2rem 0; }
      .clicked-place a { color: #7a421e; }
      .osm-choice-list {
        display: flex;
        gap: .35rem;
        margin: .35rem 0 .55rem;
        padding: 0;
        overflow-x: auto;
        list-style: none;
        scrollbar-width: thin;
      }
      .osm-choice {
        max-width: 16rem;
        min-height: 2.75rem;
        padding: .35rem .6rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        font-size: .82rem;
        cursor: pointer;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .osm-choice[aria-pressed="true"] {
        border-color: #355f4f;
        outline: 2px solid rgba(53, 95, 79, .18);
        background: #edf5f0;
        font-weight: 700;
      }
      .osm-object-card {
        padding-top: .15rem;
        border-top: 1px solid var(--border);
      }
      .osm-object-card h4 { margin: .45rem 0 .2rem; font-size: 1rem; }
      .osm-facts { display: grid; gap: .25rem; margin: .35rem 0; }
      .osm-fact { margin: 0; }
      .osm-fact-label { color: var(--muted); font-size: .78rem; font-weight: 700; }
      .osm-object-more { margin-top: .45rem; }
      .osm-object-more summary { min-height: 2.75rem; cursor: pointer; }
      .osm-object-links { display: flex; flex-wrap: wrap; gap: .6rem; margin-top: .5rem; }
      .osm-object-links a { display: inline-flex; min-height: 2.75rem; align-items: center; }
      .osm-inspect-zoom {
        min-height: 2.75rem;
        padding: .45rem .75rem;
        border: 1px solid #355f4f;
        border-radius: .45rem;
        background: #edf5f0;
        color: var(--ink);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      .maplibregl-ctrl-attrib { font-family: system-ui, sans-serif; }
      /* The attribution button is enlarged on coarse-pointer and narrow
         viewports; stock MapLibre CSS lets the ⓘ icon tile across an
         enlarged button, so pin it unconditionally. */
      .maplibregl-ctrl-attrib-button {
        background-repeat: no-repeat;
        background-position: center;
        background-size: 1.5rem;
      }
      .maplibregl-ctrl-bottom-right { right: auto; left: .5rem; }
      /* Desktop: the overlay panel collapses to a compact pill in the same
         corner — same toggle button and glanceable chip summary as the
         mobile sheet, so both form factors share one mental model. The
         query is the exact complement of the mobile layout query below,
         keeping these rules off the mobile sheet entirely. */
      @media not ((max-width: 640px) or ((max-height: 520px) and (max-width: 950px))) {
        .panel-toggle {
          display: inline-flex;
          flex: 0 0 auto;
          align-items: center;
          gap: .35rem;
          padding: .22rem .6rem;
          border: 1px solid var(--border);
          border-radius: 999px;
          background: #ffffff;
          color: var(--muted);
          font-size: .78rem;
          font-weight: 700;
          cursor: pointer;
        }
        .panel-toggle:hover { background: #eef4fb; }
        /* Chevron points where the content will go: down to expand the
           top-anchored panel, up to collapse it (mobile mirrors this). */
        .panel-toggle-icon {
          font-size: .7rem;
          transition: transform .16s ease;
          transform: rotate(180deg);
        }
        .map-panel[data-collapsed="false"] .panel-toggle-icon { transform: none; }
        .map-panel[data-collapsed="true"] {
          width: auto;
          max-width: min(27rem, calc(100vw - 4.5rem));
        }
        .map-panel[data-collapsed="true"] .panel-content { display: none; }
        .map-panel[data-collapsed="true"] .panel-selection-summary {
          display: block;
          margin: .45rem 0 0;
          color: var(--muted);
          font-size: .82rem;
        }
        .map-panel[data-collapsed="true"] .panel-selection-summary:hover { color: var(--ink); }
      }
      @media (pointer: coarse) {
        .quick-actions button,
        .view-switcher button,
        .preset-choices button,
        .route-link,
        .destination-details summary,
        .more-destinations > summary { min-height: 2.75rem; }
        .route-link { display: inline-flex; align-items: center; }
        .service-heading { min-height: 2.75rem; }
        .lang-toggle { min-width: 2.75rem; min-height: 2.75rem; }
        .service-heading input { width: 1.4rem; height: 1.4rem; }
        .dialog-close,
        .maplibregl-ctrl-group button,
        .maplibregl-ctrl-attrib-button { width: 2.75rem; height: 2.75rem; }
        /* Stock inner padding assumes a 24px button; clear the 44px one. */
        .maplibregl-ctrl-attrib.maplibregl-compact-show { padding-right: 3rem; }
      }
      @media (max-width: 640px), (max-height: 520px) and (max-width: 950px) {
        .map-panel {
          display: flex;
          flex-direction: column;
          top: auto;
          bottom: calc(.5rem + env(safe-area-inset-bottom));
          left: .5rem;
          right: .55rem;
          width: auto;
          max-height: min(72dvh, 38rem);
          padding: .65rem .75rem;
          overflow: hidden;
          border-radius: .8rem;
        }
        .panel-title-row { align-items: center; }
        .map-panel h1 { margin: 0; font-size: 1.05rem; }
        .panel-toggle {
          display: inline-flex;
          min-width: 5.6rem;
          min-height: 2.75rem;
          align-items: center;
          justify-content: center;
          gap: .4rem;
          padding: .45rem .65rem;
          border: 1px solid var(--border);
          border-radius: 999px;
          background: white;
          cursor: pointer;
        }
        .panel-toggle-icon { font-size: .8rem; transition: transform .16s ease; }
        .map-panel[data-collapsed="false"] .panel-toggle-icon { transform: rotate(180deg); }
        .panel-selection-summary {
          display: block;
          min-height: 2.75rem;
          margin: .15rem 0 0;
          overflow: hidden;
          color: var(--muted);
          font-size: .84rem;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .panel-content {
          overflow: auto;
          overscroll-behavior: contain;
          padding: .2rem .05rem calc(.15rem + env(safe-area-inset-bottom));
        }
        .map-panel[data-collapsed="true"] .panel-content { display: none; }
        .map-panel[data-collapsed="true"] { max-height: none; }
        .map-panel[data-collapsed="false"] .panel-selection-summary { display: none; }
        .map-panel[data-collapsed="false"] .panel-content { margin-top: .25rem; }
        .map-panel > .panel-content > #summary-text { margin-top: .15rem; }
        .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: .45rem; }
        .quick-actions button,
        .view-switcher button,
        .preset-choices button,
        .panel-done {
          min-height: 2.75rem;
          padding: .48rem .62rem;
        }
        .quick-actions button { border-radius: .45rem; }
        .preset-choices { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); width: 100%; }
        .preset-choices button { width: 100%; }
        .service-list { gap: .55rem; }
        .service-card { padding: .65rem .7rem; }
        .service-heading { min-height: 2.75rem; }
        .service-heading input { width: 1.4rem; height: 1.4rem; margin: 0; }
        .panel-done {
          display: flex;
          width: 100%;
          align-items: center;
          justify-content: center;
          margin-top: .6rem;
          border: 0;
          border-radius: .45rem;
          color: white;
          background: #253b59;
          font-weight: 700;
          cursor: pointer;
        }
        dialog {
          width: 100%;
          max-width: none;
          max-height: min(84dvh, 48rem);
          margin: auto 0 0;
          padding: .8rem .85rem calc(1rem + env(safe-area-inset-bottom));
          border-right: 0;
          border-bottom: 0;
          border-left: 0;
          border-radius: .85rem .85rem 0 0;
        }
        .dialog-header {
          position: sticky;
          z-index: 1;
          top: -.8rem;
          align-items: center;
          margin: -.8rem -.85rem .55rem;
          padding: .8rem .85rem .55rem;
          background: white;
          border-radius: .85rem .85rem 0 0;
        }
        .dialog-close { width: 2.75rem; height: 2.75rem; flex: 0 0 auto; }
        .destination-list li { align-items: stretch; }
        .route-link { display: inline-flex; min-height: 2.75rem; align-items: center; }
        .clicked-place a { display: inline-flex; min-height: 2.75rem; align-items: center; }
        .destination-details summary { min-height: 2.75rem; }
        .more-destinations > summary { display: flex; min-height: 2.75rem; align-items: center; cursor: pointer; }
        /* Keep the expanded attribution clear of the top-left nav control:
           the compact control is content-box, so subtract its own padding
           (.5rem + 3rem) and margins on top of the 4.5rem nav zone. */
        .maplibregl-ctrl-attrib { max-width: calc(100vw - 9rem); }
        .maplibregl-ctrl-bottom-right {
          top: calc(.5rem + env(safe-area-inset-top));
          right: calc(.5rem + env(safe-area-inset-right));
          bottom: auto;
          left: auto;
        }
        .maplibregl-ctrl-top-left {
          top: env(safe-area-inset-top);
          left: env(safe-area-inset-left);
        }
        .geolocation-status {
          top: calc(7.2rem + env(safe-area-inset-top));
          left: calc(3.8rem + env(safe-area-inset-left));
          max-width: calc(100vw - 4.6rem - env(safe-area-inset-left) - env(safe-area-inset-right));
        }
        .maplibregl-ctrl-group button,
        .maplibregl-ctrl-attrib-button { width: 2.75rem; height: 2.75rem; }
        /* Stock inner padding assumes a 24px button; clear the 44px one. */
        .maplibregl-ctrl-attrib.maplibregl-compact-show { padding-right: 3rem; }
      }
    </style>
  </head>
  <body>
    <div id="map" aria-label="Kasdienių paslaugų pasiekiamumo žemėlapis"></div>
    <p
      class="geolocation-status"
      id="geolocation-status"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      hidden
    ></p>
    <section class="map-panel" aria-label="Pasiekiamumo sąlygos" data-collapsed="true">
      <div class="panel-title-row">
        <h1 id="app-title">Kasdienis pasiekiamumas</h1>
        <button class="lang-toggle" id="lang-toggle" type="button" lang="en" aria-label="Switch to English">EN</button>
        <button
          class="panel-toggle"
          id="panel-toggle"
          type="button"
          aria-controls="panel-content"
          aria-expanded="false"
        >
          <span id="panel-toggle-label">Filtrai</span>
          <span class="panel-toggle-icon" aria-hidden="true">▲</span>
        </button>
      </div>
      <button class="panel-selection-summary" id="panel-selection-summary" type="button" aria-label="Išskleisti filtrus" aria-live="polite">Įkeliami filtrai…</button>
      <div class="panel-content" id="panel-content">
        <p id="summary-text">Įkeliami sugeneruoti duomenys…</p>
        <div class="quick-actions" id="quick-actions" role="group" aria-label="Greitos peržiūros">
          <button type="button" data-view="coffee">Tik kava ir maistas</button>
          <button type="button" data-view="everyday">Kasdienybė pėsčiomis</button>
          <button type="button" data-view="all">Visos paslaugos</button>
          <button type="button" data-view="clear">Išvalyti</button>
        </div>
        <div class="view-switcher" id="view-switcher" role="radiogroup" aria-label="Žemėlapio rodinys">
          <button type="button" role="radio" data-mode="bands" aria-checked="false">Trukmės zonos</button>
          <button type="button" role="radio" data-mode="intersect" aria-checked="false">Tenkina visas</button>

      else console.warn("vendored basemap style has no buildings layer; skipping filter removal");

      // fills to take over; this lean schema keeps all natural cover
      // (forest/wetland/grassland/farmland/urban) in the landcover layer
      // through z14, so hold it visible — thinned slightly at street zooms
      // so the access overlays keep their contrast. The kind=wetland and

      // Once a successful fix has moved the camera, later filter/language

      let geolocationCameraFollowing = false;
      let geolocationStatusState;
      let geolocationStatusHideTimer;

      // The URL records the *effective* mode so shared links reproduce what
