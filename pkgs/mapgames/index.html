<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; worker-src 'self'"
    >
    <title>Lithuania cafe walking-time map</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="assets/maplibre-gl.css">
    <script src="assets/maplibre-gl-csp.js"></script>
    <script src="assets/pmtiles.js"></script>
    <script src="assets/basemaps.js"></script>
    <style>
      html, body, #map { width: 100%; height: 100%; margin: 0; }
      body { font-family: Georgia, serif; color: #35251d; }
      .map-panel {
        position: absolute;
        z-index: 2;
        top: .65rem;
        right: .65rem;
        box-sizing: border-box;
        width: min(25rem, calc(100vw - 4.5rem));
        max-height: calc(100vh - 1.3rem);
        overflow: auto;
        padding: .85rem 1rem;
        border: 1px solid rgb(92 61 42 / 24%);
        border-radius: .55rem;
        background: rgb(255 252 246 / 94%);
        box-shadow: 0 1px 7px rgb(49 31 20 / 25%);
      }
      .map-panel h1 { margin: 0 0 .35rem; font-size: 1.18rem; }
      .map-panel p { margin: .35rem 0; line-height: 1.35; }
      .map-panel fieldset { margin: .65rem 0; border: 1px solid #d9c7b7; }
      .map-panel legend { font-weight: 700; }
      .choice-row { display: flex; flex-wrap: wrap; gap: .5rem .85rem; }
      .choice-row label { display: inline-flex; align-items: center; gap: .25rem; }
      .swatch { display: inline-block; width: .8rem; height: .8rem; border: 1px solid currentColor; }
      .swatch.one { color: #b86d1c; background: rgb(216 144 47 / 30%); }
      .swatch.two { color: #55271f; background: rgb(113 54 43 / 52%); }
      .status { min-height: 1.2em; color: #704e3a; }
      .source-note { font-size: .82rem; color: #715f53; }
      .cafe-popup h2 { margin: 0 0 .45rem; font: 700 1.05rem Georgia, serif; }
      .cafe-popup dl {
        display: grid;
        grid-template-columns: max-content minmax(0, 1fr);
        gap: .2rem .55rem;
        margin: .35rem 0;
        overflow-wrap: anywhere;
      }
      .cafe-popup dt { font-weight: 700; }
      .cafe-popup dd { margin: 0; }
      .cafe-popup details { margin-top: .45rem; }
      .cafe-popup details dl { font-size: .78rem; }
      .cafe-popup a { color: #814621; }
      .maplibregl-popup-content { color: #35251d; font-family: Georgia, serif; }
      @media (max-width: 640px) {
        .map-panel {
          left: 3.4rem;
          right: .6rem;
          width: auto;
          max-height: 48vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="map" aria-label="Lithuania cafe walking-time map"></div>
    <section class="map-panel" aria-label="Map layers">
      <h1>Walk to coffee in Lithuania</h1>
      <p id="summary-text">Loading generated data…</p>
      <fieldset>
        <legend>Walking time</legend>
        <div class="choice-row" id="time-choices"></div>
      </fieldset>
      <fieldset>
        <legend>Coverage</legend>
        <div class="choice-row">
          <label><input id="show-one" type="checkbox" checked><span class="swatch one"></span>At least 1</label>
          <label><input id="show-two" type="checkbox" checked><span class="swatch two"></span>At least 2</label>
        </div>
      </fieldset>
      <fieldset>
        <legend>Map details</legend>
        <label><input id="show-cafes" type="checkbox" checked> Cafes and coffee shops</label>
      </fieldset>
      <p class="status" id="coverage-status" aria-live="polite">Loading map…</p>
      <p class="source-note">The vector basemap, cafes, and routing output are bundled from one OSM snapshot. Display polygons are gently smoothed; raw Valhalla contours are also included.</p>
    </section>
    <script>
      maplibregl.setWorkerUrl("assets/maplibre-gl-csp-worker.js");
      const pmtilesProtocol = new pmtiles.Protocol();
      maplibregl.addProtocol("pmtiles", pmtilesProtocol.tile);

      const lithuaniaBounds = [[20.35, 53.75], [27.10, 56.60]];
      const archiveUrl = new URL("lithuania.pmtiles", location.href).href;
      const baseSource = "protomaps";
      const baseLayers = basemaps.layers(baseSource, basemaps.namedFlavor("light"), { lang: "lt" });
      // This lean schema's buildings layer contains only building polygons, so
      // it does not repeat the full Protomaps `kind=building` attribute.
      delete baseLayers.find(layer => layer.id === "buildings").filter;
      const mapStyle = {
        version: 8,
        glyphs: `${new URL("assets/fonts/", location.href).href}{fontstack}/{range}.pbf`,
        sprite: new URL("assets/sprites/light", location.href).href,
        sources: {
          [baseSource]: {
            type: "vector",
            url: `pmtiles://${archiveUrl}`,
            attribution: '<a href="https://protomaps.com">Protomaps</a> · &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
          }
        },
        layers: baseLayers
      };

      function reportMapError(error) {
        let message = error instanceof Error ? error.message : String(error ?? "Unknown error");
        try {
          const detail = JSON.parse(message);
          message = detail.message || detail.statusMessage || message;
        } catch (_error) {
          // The ordinary case is already a human-readable error string.
        }
        message = message.replaceAll(/\s+/g, " ").trim();
        document.getElementById("coverage-status").textContent = `Map data error: ${message}`;
      }

      window.addEventListener("error", event => reportMapError(event.error ?? event.message));

      const map = new maplibregl.Map({
        container: "map",
        style: mapStyle,
        bounds: lithuaniaBounds,
        fitBoundsOptions: { padding: 8 },
        minZoom: 6,
        maxZoom: 18,
        maxBounds: [[20.0, 53.5], [27.45, 56.85]],
        renderWorldCopies: false,
        dragRotate: false,
        touchPitch: false,
        pitchWithRotate: false,
        fadeDuration: 0,
        pixelRatio: Math.min(window.devicePixelRatio || 1, 1.5),
        maxTileCacheZoomLevels: 1
      });
      map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "top-left");

      map.on("error", event => {
        reportMapError(event.error);
        console.error(event.error);
      });

      function fetchJson(url) {
        return fetch(url).then(response => {
          if (!response.ok) throw new Error(`${url}: HTTP ${response.status}`);
          return response.json();
        });
      }

      function appendDefinition(list, term, value, href) {
        if (value === undefined || value === null || value === "") return;
        const dt = document.createElement("dt");
        dt.textContent = term;
        const dd = document.createElement("dd");
        if (href) {
          const link = document.createElement("a");
          link.href = href;
          link.textContent = String(value);
          link.rel = "noopener noreferrer";
          link.target = "_blank";
          dd.append(link);
        } else {
          dd.textContent = String(value);
        }
        list.append(dt, dd);
      }

      function safeWebUrl(value) {
        if (!value) return null;
        try {
          const candidate = new URL(/^https?:\/\//i.test(value) ? value : `https://${value}`);
          return ["http:", "https:"].includes(candidate.protocol) ? candidate.href : null;
        } catch (_error) {
          return null;
        }
      }

      function cafePopup(feature) {
        const properties = feature.properties || {};
        const root = document.createElement("article");
        root.className = "cafe-popup";
        const title = document.createElement("h2");
        title.textContent = properties.name || properties.brand || "Unnamed cafe or coffee shop";
        root.append(title);

        const category = properties.amenity === "cafe" ? "Cafe" : "Coffee shop";
        const address = [
          [properties["addr:street"], properties["addr:housenumber"]].filter(Boolean).join(" "),
          properties["addr:city"],
          properties["addr:postcode"]
        ].filter(Boolean).join(", ");
        const details = document.createElement("dl");
        appendDefinition(details, "Type", category);
        appendDefinition(details, "Address", address);
        appendDefinition(details, "Cuisine", properties.cuisine?.replaceAll(";", ", "));
        appendDefinition(details, "Hours", properties.opening_hours);
        appendDefinition(details, "Brand", properties.brand);
        appendDefinition(details, "Operator", properties.operator);
        appendDefinition(details, "Phone", properties.phone || properties["contact:phone"]);
        const website = properties.website || properties["contact:website"];
        appendDefinition(details, "Website", website, safeWebUrl(website));
        appendDefinition(details, "Wheelchair", properties.wheelchair);
        appendDefinition(details, "Internet", properties.internet_access || properties.wifi);
        appendDefinition(details, "Outdoor seating", properties.outdoor_seating);
        appendDefinition(details, "Takeaway", properties.takeaway);
        appendDefinition(details, "Delivery", properties.delivery);
        appendDefinition(details, "Description", properties.description);
        root.append(details);

        if (properties.osm_url) {
          const osmLink = document.createElement("a");
          osmLink.href = properties.osm_url;
          osmLink.textContent = "Open this object in OpenStreetMap";
          osmLink.rel = "noopener noreferrer";
          osmLink.target = "_blank";
          root.append(osmLink);
        }

        const allTags = document.createElement("details");
        const summary = document.createElement("summary");
        summary.textContent = "All available OSM tags";
        const tagList = document.createElement("dl");
        Object.entries(properties)
          .filter(([key]) => !["osm_url", "routing_status", "source_geometry"].includes(key))
          .sort(([left], [right]) => left.localeCompare(right))
          .forEach(([key, value]) => appendDefinition(tagList, key, value));
        allTags.append(summary, tagList);
        root.append(allTags);
        return root;
      }

      let metadata;
      let selectedMinutes = 10;

      function coverageLayerIds(minutes, minimumCafes) {
        const count = minimumCafes === 1 ? "one" : "two";
        return [`coverage-${minutes}-${count}-fill`, `coverage-${minutes}-${count}-line`];
      }

      function setLayerVisibility(layerIds, visible) {
        layerIds.forEach(layerId => map.setLayoutProperty(layerId, "visibility", visible ? "visible" : "none"));
      }

      function refreshCoverage() {
        const selected = [];
        [1, 2].forEach(minimumCafes => {
          const word = minimumCafes === 1 ? "one" : "two";
          const countSelected = document.getElementById(`show-${word}`).checked;
          metadata.coverage_tiles.forEach(item => {
            setLayerVisibility(
              coverageLayerIds(item.minutes, minimumCafes),
              countSelected && item.minutes === selectedMinutes
            );
          });
          if (countSelected) selected.push(`≥${minimumCafes}`);
        });
        document.getElementById("coverage-status").textContent = selected.length
          ? `${selectedMinutes}-minute coverage; ${selected.join(" and ")} selected.`
          : "No coverage layers selected.";
      }

      function changeCoverageTime(minutes) {
        selectedMinutes = minutes;
        refreshCoverage();
      }

      function addCoverageLayer(id, source, sourceLayer, type, paint) {
        map.addLayer({
          id,
          type,
          source,
          "source-layer": sourceLayer,
          layout: { visibility: "none" },
          paint
        });
      }

      Promise.all([
        fetchJson("metadata.json"),
        new Promise(resolve => map.once("load", resolve))
      ]).then(([loadedMetadata]) => {
        metadata = loadedMetadata;
        metadata.coverage_tiles.forEach(item => {
          const source = `coverage-${item.minutes}`;
          map.addSource(source, {
            type: "vector",
            url: `pmtiles://${new URL(item.file, location.href).href}`
          });
          const oneLayers = coverageLayerIds(item.minutes, 1);
          const twoLayers = coverageLayerIds(item.minutes, 2);
          addCoverageLayer(oneLayers[0], source, item.layers["1"], "fill", {
            "fill-color": "#d8902f",
            "fill-opacity": .30
          });
          addCoverageLayer(oneLayers[1], source, item.layers["1"], "line", {
            "line-color": "#b86d1c",
            "line-width": 1
          });
          addCoverageLayer(twoLayers[0], source, item.layers["2"], "fill", {
            "fill-color": "#71362b",
            "fill-opacity": .52
          });
          addCoverageLayer(twoLayers[1], source, item.layers["2"], "line", {
            "line-color": "#55271f",
            "line-width": 1
          });
        });
        map.addSource("cafes", { type: "geojson", data: "cafes.geojson" });
        map.addLayer({
          id: "cafes",
          type: "circle",
          source: "cafes",
          paint: {
            "circle-radius": 3,
            "circle-color": "#fff7e8",
            "circle-opacity": .95,
            "circle-stroke-color": "#392013",
            "circle-stroke-width": 1
          }
        });

        map.on("click", "cafes", event => {
          const feature = event.features?.[0];
          if (!feature) return;
          new maplibregl.Popup({ maxWidth: "340px" })
            .setLngLat(feature.geometry.coordinates)
            .setDOMContent(cafePopup(feature))
            .addTo(map);
        });
        map.on("mouseenter", "cafes", () => { map.getCanvas().style.cursor = "pointer"; });
        map.on("mouseleave", "cafes", () => { map.getCanvas().style.cursor = ""; });

        document.getElementById("summary-text").textContent =
          `${metadata.routed_cafe_count.toLocaleString()} cafes and coffee shops routed from OpenStreetMap data.`;
        const timeChoices = document.getElementById("time-choices");
        metadata.contours_minutes.forEach(minutes => {
          const label = document.createElement("label");
          const input = document.createElement("input");
          input.type = "radio";
          input.name = "minutes";
          input.value = minutes;
          input.checked = minutes === selectedMinutes;
          input.addEventListener("change", () => changeCoverageTime(Number(input.value)));
          label.append(input, `${minutes} min`);
          timeChoices.append(label);
        });
        document.getElementById("show-one").addEventListener("change", refreshCoverage);
        document.getElementById("show-two").addEventListener("change", refreshCoverage);
        document.getElementById("show-cafes").addEventListener("change", event => {
          setLayerVisibility(["cafes"], event.currentTarget.checked);
        });
        refreshCoverage();
      }).catch(error => {
        document.getElementById("summary-text").textContent = `Could not load generated data: ${error}`;
        reportMapError(error);
        console.error(error);
      });
    </script>
  </body>
</html>
